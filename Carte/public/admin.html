<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Sauf Imprévu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
            background-color: #f0f3f8;
            color: #1a2332;
            line-height: 1.6;
        }

        /* Topbar */
        .topbar {
            background: #fff;
            border-bottom: 1.5px solid #dde3ec;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 12px;
            flex-wrap: wrap;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 11px;
        }

        .topbar-logo {
            width: 36px;
            height: 36px;
            border-radius: 9px;
            background: linear-gradient(135deg, #3d5a80, #2c4260);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .topbar-logo span {
            font-size: 17px;
            color: #fff;
        }

        .topbar-info .topbar-title {
            font-size: 17px;
            font-weight: 700;
            color: #1a2332;
            line-height: 1.2;
        }

        .topbar-info .topbar-subtitle {
            font-size: 11px;
            color: #8a9bb0;
        }

        .view-menu-btn {
            margin-left: 6px;
            padding: 5px 12px;
            border: 1.5px solid #dde3ec;
            border-radius: 7px;
            background: #f7f9fc;
            color: #4a5568;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: 'DM Sans', system-ui;
            white-space: nowrap;
        }

        .view-menu-btn:hover {
            border-color: #3d5a80;
            color: #3d5a80;
            background: #e8edf4;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-selector {
            display: flex;
            gap: 3px;
            background: #f0f3f8;
            padding: 4px;
            border-radius: 10px;
        }

        .tab-pill {
            padding: 7px 15px;
            border: none;
            border-radius: 7px;
            background: none;
            color: #8a9bb0;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: 'DM Sans', system-ui;
        }

        .tab-pill:hover {
            color: #4a5568;
        }

        .tab-pill.active {
            background: #fff;
            color: #1a2332;
            box-shadow: 0 1px 4px rgba(61,90,128,0.1);
        }

        .save-btn {
            width: 36px;
            height: 36px;
            border-radius: 9px;
            border: none;
            background: #3d5a80;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            flex-shrink: 0;
            box-shadow: 0 1px 4px rgba(61,90,128,0.2);
        }

        .save-btn.saved {
            background: #f0fdf4;
            color: #166534;
            box-shadow: none;
        }

        /* Main container */
        .main-container {
            padding: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Tab content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* KPI bar */
        .kpi-bar {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
            font-size: 14px;
            color: #4a5568;
        }

        .kpi-item {
            font-weight: 500;
        }

        .kpi-value {
            color: #3d5a80;
            font-weight: 600;
        }

        /* Filter pills */
        .filter-pills {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .filter-pill {
            padding: 8px 16px;
            border: 1.5px solid #dde3ec;
            border-radius: 20px;
            background: #fff;
            color: #4a5568;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'DM Sans', system-ui;
        }

        .filter-pill:hover {
            border-color: #3d5a80;
            color: #3d5a80;
        }

        .filter-pill.active {
            background: #3d5a80;
            color: #fff;
            border-color: #3d5a80;
        }

        /* Category cards */
        .categories-grid {
            display: grid;
            gap: 16px;
            margin-bottom: 24px;
        }

        .category-card {
            background: #fff;
            border: 1.5px solid #dde3ec;
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.2s ease;
            box-shadow: 0 1px 6px rgba(61,90,128,0.07);
        }

        .category-card:hover {
            border-color: #c5d3e8;
            box-shadow: 0 2px 12px rgba(61, 90, 128, 0.12);
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .category-reorder {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .reorder-btn {
            background: none;
            border: none;
            color: #8a9bb0;
            cursor: pointer;
            padding: 2px 4px;
            font-size: 12px;
            font-family: 'DM Sans', system-ui;
            transition: color 0.2s ease;
        }

        .reorder-btn:hover {
            color: #3d5a80;
        }

        .category-image {
            width: 52px;
            height: 52px;
            border-radius: 8px;
            background: #f7f9fc;
            object-fit: cover;
            flex-shrink: 0;
        }

        .category-info {
            flex: 1;
            min-width: 0;
        }

        .category-name {
            font-size: 17px;
            font-weight: 600;
            color: #1a2332;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .category-badge {
            background: #e8edf4;
            color: #3d5a80;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .category-hidden-badge {
            background: #fef3c7;
            color: #b45309;
        }

        .category-meta {
            font-size: 12px;
            color: #8a9bb0;
            margin-top: 2px;
        }

        .category-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: auto;
            flex-shrink: 0;
        }

        .family-select {
            padding: 6px 10px;
            border: 1.5px solid #dde3ec;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'DM Sans', system-ui;
            color: #4a5568;
            background: #fff;
            cursor: pointer;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #3d5a80;
            cursor: pointer;
            padding: 4px;
            font-size: 16px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            color: #2c4260;
        }

        /* Toggle switch */
        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            background: #cbd5e1;
            border-radius: 12px;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            padding: 0;
        }

        .toggle-switch.on {
            background: #3d5a80;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 9px;
            top: 3px;
            left: 3px;
            transition: all 0.2s ease;
        }

        .toggle-switch.on::after {
            left: 23px;
        }

        /* Items section */
        .category-items {
            display: block;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #eef1f6;
        }

        .category-items.collapsed {
            display: none;
        }

        .item-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 18px;
            border-bottom: 1px solid #eef1f6;
            transition: background 0.15s;
            flex-wrap: wrap;
        }

        .item-row:hover {
            background: #f5f8fc;
        }

        .item-row:last-child {
            border-bottom: none;
        }

        .item-image {
            width: 52px;
            height: 52px;
            border-radius: 8px;
            background: #f7f9fc;
            object-fit: cover;
        }

        .item-info {
            flex: 1;
            min-width: 140px;
        }

        .item-name {
            font-weight: 600;
            font-size: 15px;
            color: #1a2332;
        }

        .item-name.unavailable {
            color: #94a3b8;
        }

        .item-description {
            font-size: 12px;
            color: #8a9bb0;
            font-style: italic;
            margin-top: 2px;
        }

        .item-tags {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .tag-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            cursor: default;
        }

        .tag-badge-note {
            font-style: italic;
            font-size: 9px;
            opacity: 0.7;
        }

        .item-price {
            font-size: 16px;
            font-weight: 700;
            color: #3d5a80;
            min-width: 58px;
            text-align: right;
        }

        .item-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .add-item-btn, .add-category-btn, .add-family-btn {
            padding: 8px;
            border: 1.5px dashed #dde3ec;
            border-radius: 7px;
            background: none;
            color: #8a9bb0;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            font-family: 'DM Sans', system-ui;
            transition: all 0.15s;
            width: 100%;
            text-align: center;
        }

        .add-item-btn {
            margin-top: 10px;
        }

        .add-item-btn:hover, .add-category-btn:hover, .add-family-btn:hover {
            border-color: #3d5a80;
            color: #3d5a80;
            background: #e8edf4;
        }

        /* Organisation tab */
        .organisation-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .family-section {
            background: #fff;
            border: 1.5px solid #dde3ec;
            border-radius: 14px;
            padding: 16px;
        }

        .family-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eef1f6;
        }

        .family-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a2332;
        }

        .org-category-row {
            display: grid;
            grid-template-columns: 1fr 60px auto auto auto;
            gap: 12px;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eef1f6;
        }

        .org-category-row:last-child {
            border-bottom: none;
        }

        .org-category-name {
            font-weight: 500;
            font-size: 14px;
            color: #1a2332;
        }

        .org-item-count {
            text-align: right;
            font-size: 12px;
            color: #8a9bb0;
        }

        /* Tags tab */
        .tags-container {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .tag-section {
            background: #fff;
            border: 1.5px solid #dde3ec;
            border-radius: 14px;
            padding: 20px;
        }

        .tag-section-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a2332;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tag-section-label {
            font-size: 10px;
            font-weight: 700;
            color: #8a9bb0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .allergen-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .allergen-card {
            border: 1.5px solid #eef1f6;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            gap: 12px;
            background: #f7f9fc;
        }

        .allergen-icon {
            font-size: 24px;
            flex-shrink: 0;
        }

        .allergen-content {
            flex: 1;
            min-width: 0;
        }

        .allergen-name {
            font-weight: 600;
            font-size: 13px;
            color: #1a2332;
        }

        .allergen-desc {
            font-size: 12px;
            color: #8a9bb0;
            margin-top: 2px;
        }

        .allergen-note {
            font-size: 11px;
            color: #5c8db8;
            font-style: italic;
            margin-top: 4px;
        }

        .allergen-usage {
            font-size: 11px;
            color: #8a9bb0;
            margin-top: 4px;
        }

        .tags-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .tag-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: #f7f9fc;
            border-radius: 8px;
            text-align: center;
        }

        .tag-item-icon {
            font-size: 20px;
        }

        .tag-item-name {
            font-size: 12px;
            font-weight: 600;
            color: #1a2332;
        }

        .tag-item-usage {
            font-size: 10px;
            color: #8a9bb0;
        }

        .legal-notice {
            margin-top: 24px;
            padding: 16px;
            background: #f7f9fc;
            border-radius: 8px;
            border-left: 4px solid #3d5a80;
            font-size: 12px;
            color: #4a5568;
        }

        .certification-warning {
            margin: 12px 0;
            padding: 12px;
            background: #fef3c7;
            border-left: 4px solid #b45309;
            border-radius: 4px;
            font-size: 12px;
            color: #78350f;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 35, 50, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 24px 60px rgba(61, 90, 128, 0.22);
        }

        .modal-subtitle {
            font-size: 10px;
            letter-spacing: 2.5px;
            color: #3d5a80;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a2332;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-weight: 700;
            font-size: 11px;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 10px 13px;
            border: 1.5px solid #dde3ec;
            border-radius: 8px;
            font-family: 'DM Sans', system-ui;
            font-size: 14px;
            color: #1a2332;
            background: #f7f9fc;
            transition: all 0.15s;
            box-sizing: border-box;
        }

        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: #3d5a80;
            background: #f7f9fc;
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .photo-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            border-bottom: 1px solid #eef1f6;
        }

        .photo-tab {
            padding: 8px 12px;
            border: none;
            background: none;
            color: #8a9bb0;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            font-family: 'DM Sans', system-ui;
            transition: all 0.2s ease;
        }

        .photo-tab.active {
            color: #3d5a80;
            border-bottom-color: #3d5a80;
        }

        .photo-content {
            display: none;
        }

        .photo-content.active {
            display: block;
        }

        .photo-preview {
            width: 100%;
            max-height: 200px;
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 12px;
        }

        .tags-selected {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .selected-tag-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }

        .selected-tag-badge .remove-tag {
            cursor: pointer;
            font-weight: 700;
            margin-left: 2px;
        }

        .tag-picker {
            border: 1.5px solid #dde3ec;
            border-radius: 12px;
            max-height: 420px;
            overflow-y: auto;
            padding: 16px;
            box-shadow: 0 8px 32px rgba(61,90,128,0.14);
            background: #fff;
        }

        .tag-picker-group {
            margin-bottom: 8px;
        }

        .tag-picker-group-title {
            font-size: 10px;
            font-weight: 700;
            color: #8a9bb0;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 7px;
            padding: 0;
        }

        .tag-picker-item {
            padding: 4px 9px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 600;
            border: 1.5px solid transparent;
            margin: 0 6px 6px 0;
        }

        .tag-picker-item:hover {
            opacity: 0.8;
        }

        .tag-picker-item.selected {
            border-color: currentColor;
            opacity: 0.5;
        }

        .tag-allergen-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 7px 10px;
            cursor: pointer;
            border-radius: 7px;
            transition: all 0.15s;
            border: 1.5px solid transparent;
            color: #4a5568;
            background: #f7f9fc;
            text-align: left;
            margin-bottom: 4px;
        }

        .tag-allergen-item:hover {
            background: #eef1f6;
        }

        .tag-allergen-item.selected {
            border-color: currentColor;
            opacity: 0.5;
        }

        .tag-allergen-details {
            flex: 1;
        }

        .tag-allergen-name {
            font-weight: 700;
            font-size: 12px;
        }

        .tag-allergen-desc {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 1px;
            line-height: 1.3;
        }

        .visibility-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 22px;
            padding: 10px 14px;
            background: #f7f9fc;
            border-radius: 8px;
        }

        .visibility-label {
            font-weight: 500;
            font-size: 13px;
            color: #4a5568;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 22px;
        }

        .btn-cancel {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 8px;
            background: #f7f9fc;
            color: #4a5568;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            font-family: 'DM Sans', system-ui;
            transition: all 0.15s;
        }

        .btn-cancel:hover {
            background: #eef1f6;
        }

        .btn-submit {
            flex: 2;
            padding: 11px;
            border: none;
            border-radius: 8px;
            background: #3d5a80;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            font-family: 'DM Sans', system-ui;
            transition: all 0.15s;
        }

        .btn-submit:hover {
            background: #2c4260;
        }

        .btn-submit:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .toast.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .main-container {
                padding: 16px;
            }

            .item-row {
                grid-template-columns: 1fr;
            }

            .allergen-grid {
                grid-template-columns: 1fr;
            }

            .modal {
                max-width: 90vw;
            }
        }
    </style>
</head>
<body>
    <!-- Topbar -->
    <div class="topbar">
        <div class="topbar-left">
            <div class="topbar-logo"><span>✦</span></div>
            <div class="topbar-info">
                <div class="topbar-title">Sauf Imprévu</div>
                <div class="topbar-subtitle">Gestion de la carte</div>
            </div>
            <a class="view-menu-btn" href="/menu/sauf-imprevu" target="_blank">
                <span style="font-size:13px">👁</span> Voir la carte
            </a>
        </div>
        <div class="topbar-right">
            <div class="tab-selector">
                <button class="tab-pill active" data-tab="carte">Carte</button>
                <button class="tab-pill" data-tab="organisation">Organisation</button>
                <button class="tab-pill" data-tab="tags">Tags</button>
            </div>
            <button class="save-btn" id="saveBtn" title="Sauvegarder">💾</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- CARTE TAB -->
        <div id="carte-tab" class="tab-content active">
            <div class="kpi-bar">
                <div class="kpi-item">
                    <span class="kpi-value" id="kpi-families">0</span> familles
                </div>
                <div class="kpi-item">
                    <span class="kpi-value" id="kpi-categories">0</span> catégories
                </div>
                <div class="kpi-item">
                    <span class="kpi-value" id="kpi-items">0</span> plats
                </div>
                <div class="kpi-item">
                    prix moyen <span class="kpi-value" id="kpi-avg-price">0</span> €
                </div>
            </div>

            <div class="filter-pills" id="family-filters"></div>

            <div class="categories-grid" id="categories-container"></div>

            <button class="add-category-btn">+ Nouvelle catégorie</button>
        </div>

        <!-- ORGANISATION TAB -->
        <div id="organisation-tab" class="tab-content">
            <div class="organisation-container" id="organisation-container"></div>
        </div>

        <!-- TAGS TAB -->
        <div id="tags-tab" class="tab-content">
            <div class="tags-container" id="tags-container"></div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="item-modal">
        <div class="modal">
            <div class="modal-title" id="item-modal-title">Ajouter un plat</div>
            <form id="item-form">
                <div class="form-group">
                    <label class="form-label">Nom</label>
                    <input type="text" class="form-input" id="item-name" placeholder="Nom du plat" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea class="form-textarea" id="item-description" placeholder="Description du plat"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Prix €</label>
                    <input type="number" class="form-input" id="item-price" placeholder="12.50" step="0.01" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Photo</label>
                    <div class="photo-tabs">
                        <button type="button" class="photo-tab active" data-photo-tab="upload">Upload</button>
                        <button type="button" class="photo-tab" data-photo-tab="url">URL</button>
                    </div>
                    <div id="photo-upload" class="photo-content active">
                        <input type="file" id="item-photo-file" accept="image/*" style="display: none;">
                        <button type="button" class="form-input" style="text-align: center; background: #f7f9fc; padding: 16px; cursor: pointer; border: 1px solid #dde3ec;">
                            Cliquez pour uploader une image
                        </button>
                        <img id="item-photo-preview" class="photo-preview" style="display: none;">
                    </div>
                    <div id="photo-url" class="photo-content">
                        <input type="url" class="form-input" id="item-photo-url" placeholder="https://example.com/image.jpg">
                        <img id="item-photo-url-preview" class="photo-preview" style="display: none;">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Tags</label>
                    <div class="tags-selected" id="item-tags-selected"></div>
                    <div class="tag-picker" id="item-tag-picker"></div>
                </div>

                <div class="modal-buttons">
                    <button type="button" class="btn-cancel">Annuler</button>
                    <button type="submit" class="btn-submit">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="category-modal">
        <div class="modal">
            <div class="modal-title" id="category-modal-title">Ajouter une catégorie</div>
            <form id="category-form">
                <div class="form-group">
                    <label class="form-label">Nom</label>
                    <input type="text" class="form-input" id="category-name" placeholder="Nom de la catégorie" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Famille</label>
                    <select class="form-select" id="category-family" required>
                        <option value="">Sélectionner une famille</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Photo d'ambiance</label>
                    <div class="photo-tabs">
                        <button type="button" class="photo-tab active" data-photo-tab="upload">Upload</button>
                        <button type="button" class="photo-tab" data-photo-tab="url">URL</button>
                    </div>
                    <div id="cat-photo-upload" class="photo-content active">
                        <input type="file" id="category-photo-file" accept="image/*" style="display: none;">
                        <button type="button" class="form-input" style="text-align: center; background: #f7f9fc; padding: 16px; cursor: pointer; border: 1px solid #dde3ec;">
                            Cliquez pour uploader une image
                        </button>
                        <img id="category-photo-preview" class="photo-preview" style="display: none;">
                    </div>
                    <div id="cat-photo-url" class="photo-content">
                        <input type="url" class="form-input" id="category-photo-url" placeholder="https://example.com/image.jpg">
                        <img id="category-photo-url-preview" class="photo-preview" style="display: none;">
                    </div>
                </div>

                <div class="visibility-control">
                    <label class="visibility-label">Visible</label>
                    <button type="button" class="toggle-switch on" id="category-visible"></button>
                </div>

                <div class="modal-buttons">
                    <button type="button" class="btn-cancel">Annuler</button>
                    <button type="submit" class="btn-submit">Créer</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="family-modal">
        <div class="modal">
            <div class="modal-title" id="family-modal-title">Ajouter une famille</div>
            <form id="family-form">
                <div class="form-group">
                    <label class="form-label">Nom</label>
                    <input type="text" class="form-input" id="family-name" placeholder="Nom de la famille" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Photo</label>
                    <input type="file" id="family-photo-file" accept="image/*" style="display: none;">
                    <button type="button" class="form-input" style="text-align: center; background: #f7f9fc; padding: 16px; cursor: pointer; border: 1px solid #dde3ec;">
                        Cliquez pour uploader une image
                    </button>
                    <img id="family-photo-preview" class="photo-preview" style="display: none;">
                </div>

                <div class="modal-buttons">
                    <button type="button" class="btn-cancel">Annuler</button>
                    <button type="submit" class="btn-submit">Créer</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // STATE
        let state = {
            restaurantId: null,
            families: [],
            categories: [],
            items: [],
            tags: [],
            tagLookup: {}, // slug -> tag data
            selectedFamily: null, // for carte tab filtering
            currentEditingItem: null,
            currentEditingCategory: null,
            currentEditingCategoryId: null,
            currentEditingFamily: null,
            selectedTags: []
        };

        // API HELPERS
        async function apiCall(endpoint, options = {}) {
            const response = await fetch(`/api${endpoint}`, {
                headers: {
                    'Content-Type': 'application/json',
                    ...options.headers
                },
                ...options
            });
            if (!response.ok) {
                const error = await response.text();
                throw new Error(error || `API error: ${response.status}`);
            }
            return response.json();
        }

        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('image', file);
            const response = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });
            if (!response.ok) throw new Error('Upload failed');
            const data = await response.json();
            return data.url;
        }

        // INITIALIZATION
        async function init() {
            try {
                // Get first restaurant
                const restaurants = await apiCall('/restaurants');
                if (!restaurants.length) {
                    showToast('No restaurant found', 'error');
                    return;
                }
                state.restaurantId = restaurants[0].id;

                // Load all data
                await Promise.all([
                    loadFamilies(),
                    loadCategories(),
                    loadItems(),
                    loadTags()
                ]);

                setupEventListeners();
                renderCarte();
                updateKPI();
            } catch (error) {
                console.error('Init error:', error);
                showToast('Erreur lors du chargement', 'error');
            }
        }

        async function loadFamilies() {
            state.families = await apiCall(`/families?restaurant_id=${state.restaurantId}`);
        }

        async function loadCategories() {
            state.categories = await apiCall(`/categories?restaurant_id=${state.restaurantId}`);
        }

        async function loadItems() {
            state.items = await apiCall(`/items?restaurant_id=${state.restaurantId}`);
        }

        async function loadTags() {
            state.tags = await apiCall('/tags');
            // Build lookup map
            state.tagLookup = {};
            state.tags.forEach(tag => {
                state.tagLookup[tag.slug] = tag;
            });
        }

        // UI RENDERING
        function renderCarte() {
            renderFamilyFilters();
            renderCategories();
        }

        function renderFamilyFilters() {
            const container = document.getElementById('family-filters');
            container.innerHTML = '';

            const allBtn = document.createElement('button');
            allBtn.className = 'filter-pill active';
            allBtn.textContent = 'Tous';
            allBtn.onclick = () => {
                state.selectedFamily = null;
                document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
                allBtn.classList.add('active');
                renderCategories();
            };
            container.appendChild(allBtn);

            state.families.forEach(family => {
                const btn = document.createElement('button');
                btn.className = 'filter-pill';
                btn.textContent = family.name;
                btn.onclick = () => {
                    state.selectedFamily = family.id;
                    document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderCategories();
                };
                container.appendChild(btn);
            });
        }

        function renderCategories() {
            const container = document.getElementById('categories-container');
            container.innerHTML = '';

            let filteredCategories = state.categories;
            if (state.selectedFamily) {
                filteredCategories = filteredCategories.filter(c => c.family_id === state.selectedFamily);
            }

            filteredCategories.forEach((category, index) => {
                const card = document.createElement('div');
                card.className = 'category-card';

                const family = state.families.find(f => f.id === category.family_id);
                const items = state.items.filter(i => i.category_id === category.id);

                card.innerHTML = `
                    <div class="category-header">
                        <div class="category-reorder">
                            <button class="reorder-btn" data-action="move-up" data-category-id="${category.id}">▲</button>
                            <button class="reorder-btn" data-action="move-down" data-category-id="${category.id}">▼</button>
                        </div>
                        <img src="${category.image_url || ''}" alt="" class="category-image" onerror="this.style.display='none'">
                        <div class="category-info">
                            <div class="category-name">
                                ${category.name}
                                ${family ? `<span class="category-badge">${family.name}</span>` : ''}
                                ${!category.visible ? '<span class="category-badge category-hidden-badge">Masquée</span>' : ''}
                            </div>
                            <div class="category-meta">${items.length} plat${items.length !== 1 ? 's' : ''}</div>
                        </div>
                        <div class="category-controls">
                            <select class="family-select" data-category-id="${category.id}">
                                <option value="">Sans famille</option>
                                ${state.families.map(f => `<option value="${f.id}" ${f.id === category.family_id ? 'selected' : ''}>${f.name}</option>`).join('')}
                            </select>
                            <button class="icon-btn" title="Éditer" data-action="edit-category" data-id="${category.id}">✎</button>
                            <button class="toggle-switch ${category.visible ? 'on' : ''}" data-action="toggle-visible" data-id="${category.id}" data-type="category"></button>
                            <button class="icon-btn" data-action="toggle-expand" data-id="${category.id}">▼</button>
                        </div>
                    </div>

                    <div class="category-items" id="items-${category.id}">
                        ${items.map(item => `
                            <div class="item-row">
                                <img src="${item.image_url || ''}" alt="" class="item-image" onerror="this.style.display='none'">
                                <div class="item-info">
                                    <div class="item-name">${item.name}</div>
                                    <div class="item-description">${item.description || ''}</div>
                                    <div class="item-tags">
                                        ${(item.tag_slugs || '').split(',').filter(Boolean).map(slug => {
                                            const tag = state.tagLookup[slug.trim()];
                                            if (!tag) return '';
                                            return `
                                                <div class="tag-badge" style="background-color: ${tag.bg}; color: ${tag.color};">
                                                    ${tag.icon ? `<span>${tag.icon}</span>` : ''}
                                                    <span>${tag.name}</span>
                                                    ${tag.note ? `<span class="tag-badge-note">${tag.note}</span>` : ''}
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>
                                <div class="item-price">${item.price.toFixed(2)} €</div>
                                <div class="item-controls">
                                    <button class="toggle-switch ${!!item.available ? 'on' : ''}" data-action="toggle-available" data-id="${item.id}"></button>
                                    <button class="icon-btn" data-action="edit-item" data-id="${item.id}">✎</button>
                                </div>
                            </div>
                        `).join('')}
                        <button class="add-item-btn" data-category-id="${category.id}">+ Ajouter un plat</button>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function renderOrganisation() {
            const container = document.getElementById('organisation-container');
            container.innerHTML = '';

            // Families
            state.families.forEach(family => {
                const section = document.createElement('div');
                section.className = 'family-section';

                const familyCategories = state.categories.filter(c => c.family_id === family.id);

                section.innerHTML = `
                    <div class="family-header">
                        <div class="family-title">${family.name}</div>
                        <button class="icon-btn" data-action="edit-family" data-id="${family.id}">✎</button>
                    </div>
                    ${familyCategories.map((cat, index) => {
                        const itemCount = state.items.filter(i => i.category_id === cat.id).length;
                        return `
                            <div class="org-category-row">
                                <div class="org-category-name">${cat.name}</div>
                                <div class="org-item-count">${itemCount} plat${itemCount !== 1 ? 's' : ''}</div>
                                <button class="toggle-switch ${cat.visible ? 'on' : ''}" data-action="toggle-visible" data-id="${cat.id}" data-type="category"></button>
                                <button class="icon-btn" data-action="edit-category" data-id="${cat.id}">✎</button>
                                <div class="category-reorder">
                                    <button class="reorder-btn" data-action="move-category-up" data-category-id="${cat.id}">▲</button>
                                    <button class="reorder-btn" data-action="move-category-down" data-category-id="${cat.id}">▼</button>
                                </div>
                            </div>
                        `;
                    }).join('')}
                `;

                container.appendChild(section);
            });

            // Sans famille
            const unassignedCategories = state.categories.filter(c => !c.family_id);
            if (unassignedCategories.length) {
                const section = document.createElement('div');
                section.className = 'family-section';
                section.innerHTML = `
                    <div class="family-header">
                        <div class="family-title">Sans famille</div>
                    </div>
                    ${unassignedCategories.map(cat => {
                        const itemCount = state.items.filter(i => i.category_id === cat.id).length;
                        return `
                            <div class="org-category-row">
                                <div class="org-category-name">${cat.name}</div>
                                <div class="org-item-count">${itemCount} plat${itemCount !== 1 ? 's' : ''}</div>
                                <button class="toggle-switch ${cat.visible ? 'on' : ''}" data-action="toggle-visible" data-id="${cat.id}" data-type="category"></button>
                                <button class="icon-btn" data-action="edit-category" data-id="${cat.id}">✎</button>
                            </div>
                        `;
                    }).join('')}
                `;
                container.appendChild(section);
            }

            // Buttons
            const buttonContainer = document.createElement('div');
            buttonContainer.style.display = 'flex';
            buttonContainer.style.gap = '12px';
            const addFamilyBtn = document.createElement('button');
            addFamilyBtn.className = 'add-family-btn';
            addFamilyBtn.textContent = '+ Nouvelle famille';
            addFamilyBtn.onclick = () => openFamilyModal();
            buttonContainer.appendChild(addFamilyBtn);

            const addCategoryBtn = document.createElement('button');
            addCategoryBtn.className = 'add-category-btn';
            addCategoryBtn.textContent = '+ Nouvelle catégorie';
            addCategoryBtn.onclick = () => openCategoryModal();
            buttonContainer.appendChild(addCategoryBtn);

            container.appendChild(buttonContainer);
        }

        function renderTags() {
            const container = document.getElementById('tags-container');
            container.innerHTML = '';

            // Group tags by category
            const grouped = {};
            state.tags.forEach(tag => {
                if (!grouped[tag.category]) grouped[tag.category] = [];
                grouped[tag.category].push(tag);
            });

            const categoryLabels = {
                'ALLERGEN': { name: 'Allergènes', label: '14 réglementaires' },
                'PRODUCT_TYPE': { name: 'Type de produit', label: '' },
                'BEVERAGE': { name: 'Boissons', label: '' },
                'CERTIFICATION': { name: 'Certifications', label: '' },
                'ORIGIN': { name: 'Origine & labels', label: '' },
                'OFFER': { name: 'Offres & menus', label: '' },
                'HIGHLIGHT': { name: 'Mise en avant', label: '' }
            };

            ['ALLERGEN', 'PRODUCT_TYPE', 'BEVERAGE', 'CERTIFICATION', 'ORIGIN', 'OFFER', 'HIGHLIGHT'].forEach(category => {
                if (!grouped[category]) return;

                const section = document.createElement('div');
                section.className = 'tag-section';

                const label = categoryLabels[category];
                const titleDiv = document.createElement('div');
                titleDiv.className = 'tag-section-title';
                titleDiv.innerHTML = `${label.name} ${label.label ? `<span class="tag-section-label">(${label.label})</span>` : ''}`;
                section.appendChild(titleDiv);

                if (category === 'ALLERGEN') {
                    // Allergens: 2-column grid
                    const grid = document.createElement('div');
                    grid.className = 'allergen-grid';
                    grouped[category].forEach(tag => {
                        const itemCount = state.items.filter(item => (item.tag_slugs || '').includes(tag.slug)).length;
                        const card = document.createElement('div');
                        card.className = 'allergen-card';
                        card.innerHTML = `
                            <div class="allergen-icon">${tag.icon || '⚠'}</div>
                            <div class="allergen-content">
                                <div class="allergen-name">${tag.name}</div>
                                <div class="allergen-desc">${tag.description || ''}</div>
                                ${tag.note ? `<div class="allergen-note">${tag.note}</div>` : ''}
                                <div class="allergen-usage">${itemCount} item${itemCount !== 1 ? 's' : ''}</div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                    section.appendChild(grid);

                    const legal = document.createElement('div');
                    legal.className = 'legal-notice';
                    legal.textContent = 'Règlement (UE) n°1169/2011 — Les 14 allergènes à déclaration obligatoire';
                    section.appendChild(legal);
                } else if (category === 'CERTIFICATION') {
                    // Certifications with warning
                    const grid = document.createElement('div');
                    grid.className = 'tags-grid';
                    grouped[category].forEach(tag => {
                        const itemCount = state.items.filter(item => (item.tag_slugs || '').includes(tag.slug)).length;
                        const item = document.createElement('div');
                        item.className = 'tag-item';
                        item.style.backgroundColor = tag.bg || '#f7f9fc';
                        item.style.color = tag.color || '#1a2332';
                        item.innerHTML = `
                            <div class="tag-item-icon">${tag.icon || '✓'}</div>
                            <div class="tag-item-name">${tag.name}</div>
                            <div class="tag-item-usage">${itemCount} item${itemCount !== 1 ? 's' : ''}</div>
                        `;
                        grid.appendChild(item);
                    });
                    section.appendChild(grid);

                    const warning = document.createElement('div');
                    warning.className = 'certification-warning';
                    warning.innerHTML = '⚠ Ne pas afficher sans certification officielle valide';
                    section.appendChild(warning);
                } else {
                    // Other tags: pill layout
                    const grid = document.createElement('div');
                    grid.className = 'tags-grid';
                    grouped[category].forEach(tag => {
                        const itemCount = state.items.filter(item => (item.tag_slugs || '').includes(tag.slug)).length;
                        const item = document.createElement('div');
                        item.className = 'tag-item';
                        item.style.backgroundColor = tag.bg || '#f7f9fc';
                        item.style.color = tag.color || '#1a2332';
                        item.innerHTML = `
                            <div class="tag-item-icon">${tag.icon || '◆'}</div>
                            <div class="tag-item-name">${tag.name}</div>
                            <div class="tag-item-usage">${itemCount} item${itemCount !== 1 ? 's' : ''}</div>
                        `;
                        grid.appendChild(item);
                    });
                    section.appendChild(grid);
                }

                container.appendChild(section);
            });
        }

        function updateKPI() {
            const totalItems = state.items.length;
            const totalPrice = state.items.reduce((sum, item) => sum + (item.price || 0), 0);
            const avgPrice = totalItems > 0 ? (totalPrice / totalItems).toFixed(2) : '0.00';

            document.getElementById('kpi-families').textContent = state.families.length;
            document.getElementById('kpi-categories').textContent = state.categories.length;
            document.getElementById('kpi-items').textContent = totalItems;
            document.getElementById('kpi-avg-price').textContent = avgPrice;
        }

        // EVENT LISTENERS
        function setupEventListeners() {
            // Tab switching
            document.querySelectorAll('.tab-pill').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.tab-pill').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    const tabId = e.target.dataset.tab;
                    document.getElementById(tabId + '-tab').classList.add('active');

                    if (tabId === 'organisation') {
                        renderOrganisation();
                    } else if (tabId === 'tags') {
                        renderTags();
                    }
                });
            });

            // Add category button
            document.querySelectorAll('.add-category-btn').forEach(btn => {
                btn.addEventListener('click', openCategoryModal);
            });

            // Main delegated event handler
            document.addEventListener('click', async (e) => {
                // Add item button
                const addItemBtn = e.target.closest('.add-item-btn');
                if (addItemBtn) {
                    const categoryId = parseInt(addItemBtn.dataset.categoryId);
                    openItemModal(null, categoryId);
                    return;
                }

                // Edit item
                const editItemBtn = e.target.closest('[data-action="edit-item"]');
                if (editItemBtn) {
                    const itemId = parseInt(editItemBtn.dataset.id);
                    const item = state.items.find(i => i.id === itemId);
                    openItemModal(item);
                    return;
                }

                // Edit category
                const editCategoryBtn = e.target.closest('[data-action="edit-category"]');
                if (editCategoryBtn) {
                    const categoryId = parseInt(editCategoryBtn.dataset.id);
                    const category = state.categories.find(c => c.id === categoryId);
                    openCategoryModal(category);
                    return;
                }

                // Edit family
                const editFamilyBtn = e.target.closest('[data-action="edit-family"]');
                if (editFamilyBtn) {
                    const familyId = parseInt(editFamilyBtn.dataset.id);
                    const family = state.families.find(f => f.id === familyId);
                    openFamilyModal(family);
                    return;
                }

                // Toggle expand
                const toggleExpandBtn = e.target.closest('[data-action="toggle-expand"]');
                if (toggleExpandBtn) {
                    const categoryId = parseInt(toggleExpandBtn.dataset.id);
                    const itemsDiv = document.getElementById(`items-${categoryId}`);
                    itemsDiv.classList.toggle('collapsed');
                    toggleExpandBtn.textContent = itemsDiv.classList.contains('collapsed') ? '▼' : '▲';
                    return;
                }

                // Toggle visible
                const toggleVisibleBtn = e.target.closest('[data-action="toggle-visible"]');
                if (toggleVisibleBtn) {
                    const id = parseInt(toggleVisibleBtn.dataset.id);
                    const type = toggleVisibleBtn.dataset.type;
                    toggleVisibleBtn.classList.toggle('on');
                    const newVisible = toggleVisibleBtn.classList.contains('on');
                    if (type === 'category') {
                        await updateCategory(id, { visible: newVisible });
                    }
                    return;
                }

                // Toggle available
                const toggleAvailableBtn = e.target.closest('[data-action="toggle-available"]');
                if (toggleAvailableBtn) {
                    const id = parseInt(toggleAvailableBtn.dataset.id);
                    toggleAvailableBtn.classList.toggle('on');
                    const newAvailable = toggleAvailableBtn.classList.contains('on');
                    await updateItem(id, { available: newAvailable });
                    return;
                }

                // Move up/down buttons
                const moveUpBtn = e.target.closest('[data-action="move-up"]');
                if (moveUpBtn) {
                    const categoryId = parseInt(moveUpBtn.dataset.categoryId);
                    await reorderCategory(categoryId, -1);
                    return;
                }

                const moveDownBtn = e.target.closest('[data-action="move-down"]');
                if (moveDownBtn) {
                    const categoryId = parseInt(moveDownBtn.dataset.categoryId);
                    await reorderCategory(categoryId, 1);
                    return;
                }

                const moveCategoryUpBtn = e.target.closest('[data-action="move-category-up"]');
                if (moveCategoryUpBtn) {
                    const categoryId = parseInt(moveCategoryUpBtn.dataset.categoryId);
                    await reorderCategory(categoryId, -1);
                    return;
                }

                const moveCategoryDownBtn = e.target.closest('[data-action="move-category-down"]');
                if (moveCategoryDownBtn) {
                    const categoryId = parseInt(moveCategoryDownBtn.dataset.categoryId);
                    await reorderCategory(categoryId, 1);
                    return;
                }
            });

            // Family select change (delegated)
            document.addEventListener('change', async (e) => {
                if (e.target.classList.contains('family-select')) {
                    const categoryId = parseInt(e.target.dataset.categoryId);
                    const familyId = e.target.value ? parseInt(e.target.value) : null;
                    await updateCategory(categoryId, { family_id: familyId });
                }
            });

            // Modal buttons
            document.getElementById('item-form').addEventListener('submit', handleItemSubmit);
            document.getElementById('category-form').addEventListener('submit', handleCategorySubmit);
            document.getElementById('family-form').addEventListener('submit', handleFamilySubmit);

            // Modal cancel buttons
            document.querySelectorAll('.btn-cancel').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const modal = e.target.closest('.modal-overlay');
                    modal.classList.remove('active');
                });
            });

            // Photo tabs
            document.querySelectorAll('.photo-tab').forEach(tab => {
                tab.addEventListener('click', (e) => {
                    e.preventDefault();
                    const photoType = e.target.dataset.photoTab;
                    const modal = e.target.closest('.modal');
                    modal.querySelectorAll('.photo-tab').forEach(t => t.classList.remove('active'));
                    modal.querySelectorAll('.photo-content').forEach(c => c.classList.remove('active'));
                    e.target.classList.add('active');
                    const prefix = modal.id === 'item-modal' ? 'item' : modal.id === 'category-modal' ? 'category' : 'family';
                    const prefixAlt = modal.id === 'category-modal' ? 'cat' : '';
                    const selector = prefixAlt ? `#${prefixAlt}-photo-${photoType}` : `#photo-${photoType}`;
                    modal.querySelector(selector)?.classList.add('active');
                });
            });

            // Photo upload buttons
            document.addEventListener('click', (e) => {
                if (e.target.closest('#photo-upload .form-input')) {
                    e.preventDefault();
                    document.getElementById('item-photo-file').click();
                }
                if (e.target.closest('#cat-photo-upload .form-input')) {
                    e.preventDefault();
                    document.getElementById('category-photo-file').click();
                }
                if (e.target.closest('#family-photo-file').parentElement.querySelector('.form-input')) {
                    const btn = document.querySelector('[style*="padding: 16px"]');
                    if (btn && btn.textContent.includes('Cliquez')) {
                        e.preventDefault();
                        document.getElementById('family-photo-file').click();
                    }
                }
            });

            document.getElementById('item-photo-file').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const preview = document.getElementById('item-photo-preview');
                        preview.src = event.target.result;
                        preview.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                }
            });

            document.getElementById('category-photo-file').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const preview = document.getElementById('category-photo-preview');
                        preview.src = event.target.result;
                        preview.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                }
            });

            document.getElementById('family-photo-file').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const preview = document.getElementById('family-photo-preview');
                        preview.src = event.target.result;
                        preview.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                }
            });

            // Photo URL preview
            document.getElementById('item-photo-url').addEventListener('change', (e) => {
                if (e.target.value) {
                    const preview = document.getElementById('item-photo-url-preview');
                    preview.src = e.target.value;
                    preview.style.display = 'block';
                }
            });

            document.getElementById('category-photo-url').addEventListener('change', (e) => {
                if (e.target.value) {
                    const preview = document.getElementById('category-photo-url-preview');
                    preview.src = e.target.value;
                    preview.style.display = 'block';
                }
            });

            // Visibility toggle
            document.getElementById('category-visible').addEventListener('click', (e) => {
                e.preventDefault();
                e.target.classList.toggle('on');
            });
        }

        // MODALS
        function openItemModal(item = null, categoryId = null) {
            state.currentEditingItem = item;
            state.currentEditingCategoryId = categoryId || item?.category_id;
            state.selectedTags = item ? (item.tag_slugs || '').split(',').filter(Boolean).map(s => s.trim()) : [];

            const modal = document.getElementById('item-modal');
            const title = document.getElementById('item-modal-title');
            const form = document.getElementById('item-form');

            title.textContent = item ? 'Éditer un plat' : 'Ajouter un plat';

            document.getElementById('item-name').value = item?.name || '';
            document.getElementById('item-description').value = item?.description || '';
            document.getElementById('item-price').value = item?.price || '';

            // Reset photos
            document.getElementById('item-photo-file').value = '';
            document.getElementById('item-photo-preview').style.display = 'none';
            document.getElementById('item-photo-url').value = item?.image_url || '';
            if (item?.image_url) {
                document.getElementById('item-photo-url-preview').src = item.image_url;
                document.getElementById('item-photo-url-preview').style.display = 'block';
            } else {
                document.getElementById('item-photo-url-preview').style.display = 'none';
            }

            renderTagPicker();
            modal.classList.add('active');
        }

        function openCategoryModal(category = null) {
            state.currentEditingCategory = category;

            const modal = document.getElementById('category-modal');
            const title = document.getElementById('category-modal-title');
            const submitBtn = modal.querySelector('.btn-submit');

            title.textContent = category ? 'Éditer une catégorie' : 'Ajouter une catégorie';
            submitBtn.textContent = category ? 'Enregistrer' : 'Créer';

            document.getElementById('category-name').value = category?.name || '';
            document.getElementById('category-family').innerHTML = '<option value="">Sélectionner une famille</option>' +
                state.families.map(f => `<option value="${f.id}" ${f.id === category?.family_id ? 'selected' : ''}>${f.name}</option>`).join('');
            document.getElementById('category-family').value = category?.family_id || '';

            document.getElementById('category-visible').classList.toggle('on', !!category?.visible);

            // Reset photos
            document.getElementById('category-photo-file').value = '';
            document.getElementById('category-photo-preview').style.display = 'none';
            document.getElementById('category-photo-url').value = category?.image_url || '';
            if (category?.image_url) {
                document.getElementById('category-photo-url-preview').src = category.image_url;
                document.getElementById('category-photo-url-preview').style.display = 'block';
            } else {
                document.getElementById('category-photo-url-preview').style.display = 'none';
            }

            modal.classList.add('active');
        }

        function openFamilyModal(family = null) {
            state.currentEditingFamily = family;

            const modal = document.getElementById('family-modal');
            const title = document.getElementById('family-modal-title');
            const submitBtn = modal.querySelector('.btn-submit');

            title.textContent = family ? 'Éditer une famille' : 'Ajouter une famille';
            submitBtn.textContent = family ? 'Enregistrer' : 'Créer';

            document.getElementById('family-name').value = family?.name || '';

            // Reset photo
            document.getElementById('family-photo-file').value = '';
            document.getElementById('family-photo-preview').style.display = 'none';

            modal.classList.add('active');
        }

        function renderTagPicker() {
            const container = document.getElementById('item-tag-picker');
            container.innerHTML = '';

            // Group tags by category
            const grouped = {};
            state.tags.forEach(tag => {
                if (!grouped[tag.category]) grouped[tag.category] = [];
                grouped[tag.category].push(tag);
            });

            Object.keys(grouped).forEach(category => {
                const group = document.createElement('div');
                group.className = 'tag-picker-group';

                const groupTitle = document.createElement('div');
                groupTitle.className = 'tag-picker-group-title';
                groupTitle.textContent = category;
                group.appendChild(groupTitle);

                if (category === 'ALLERGEN') {
                    grouped[category].forEach(tag => {
                        const item = document.createElement('div');
                        item.className = 'tag-allergen-item' + (state.selectedTags.includes(tag.slug) ? ' selected' : '');
                        item.innerHTML = `
                            <div class="allergen-icon">${tag.icon || '⚠'}</div>
                            <div class="tag-allergen-details">
                                <div class="tag-allergen-name">${tag.name}</div>
                                <div class="tag-allergen-desc">${tag.description || ''}</div>
                            </div>
                        `;
                        item.addEventListener('click', () => {
                            if (state.selectedTags.includes(tag.slug)) {
                                state.selectedTags = state.selectedTags.filter(s => s !== tag.slug);
                            } else {
                                state.selectedTags.push(tag.slug);
                            }
                            renderTagPicker();
                            renderSelectedTags();
                        });
                        group.appendChild(item);
                    });
                } else {
                    grouped[category].forEach(tag => {
                        const item = document.createElement('div');
                        item.className = 'tag-picker-item' + (state.selectedTags.includes(tag.slug) ? ' selected' : '');
                        item.style.color = tag.color;
                        item.style.backgroundColor = tag.bg;
                        item.innerHTML = `${tag.icon ? `<span>${tag.icon}</span>` : ''}<span>${tag.name}</span>`;
                        item.addEventListener('click', () => {
                            if (state.selectedTags.includes(tag.slug)) {
                                state.selectedTags = state.selectedTags.filter(s => s !== tag.slug);
                            } else {
                                state.selectedTags.push(tag.slug);
                            }
                            renderTagPicker();
                            renderSelectedTags();
                        });
                        group.appendChild(item);
                    });
                }

                container.appendChild(group);
            });
        }

        function renderSelectedTags() {
            const container = document.getElementById('item-tags-selected');
            container.innerHTML = '';
            state.selectedTags.forEach(slug => {
                const tag = state.tagLookup[slug];
                if (!tag) return;
                const badge = document.createElement('div');
                badge.className = 'selected-tag-badge';
                badge.style.backgroundColor = tag.bg;
                badge.style.color = tag.color;
                badge.innerHTML = `
                    <span>${tag.icon ? `<span>${tag.icon}</span>` : ''}${tag.name}</span>
                    <span class="remove-tag">×</span>
                `;
                badge.querySelector('.remove-tag').addEventListener('click', () => {
                    state.selectedTags = state.selectedTags.filter(s => s !== slug);
                    renderTagPicker();
                    renderSelectedTags();
                });
                container.appendChild(badge);
            });
        }

        // FORM HANDLERS
        async function handleItemSubmit(e) {
            e.preventDefault();

            const name = document.getElementById('item-name').value;
            const description = document.getElementById('item-description').value;
            const price = parseFloat(document.getElementById('item-price').value);
            const categoryId = state.currentEditingCategoryId;

            let imageUrl = document.getElementById('item-photo-url').value;
            const photoFile = document.getElementById('item-photo-file').files[0];
            if (photoFile) {
                try {
                    imageUrl = await uploadFile(photoFile);
                } catch (error) {
                    showToast('Erreur upload photo', 'error');
                    return;
                }
            }

            try {
                if (state.currentEditingItem) {
                    await updateItem(state.currentEditingItem.id, {
                        name,
                        description,
                        price,
                        image_url: imageUrl,
                        tag_slugs: state.selectedTags
                    });
                } else {
                    await apiCall('/items', {
                        method: 'POST',
                        body: JSON.stringify({
                            name,
                            description,
                            price,
                            category_id: categoryId,
                            image_url: imageUrl,
                            tag_slugs: state.selectedTags
                        })
                    });
                }

                await loadItems();
                renderCarte();
                updateKPI();
                document.getElementById('item-modal').classList.remove('active');
                showToast('Plat enregistré', 'success');
            } catch (error) {
                console.error('Error:', error);
                showToast('Erreur lors de l\'enregistrement', 'error');
            }
        }

        async function handleCategorySubmit(e) {
            e.preventDefault();

            const name = document.getElementById('category-name').value;
            const familyId = document.getElementById('category-family').value || null;
            const visible = document.getElementById('category-visible').classList.contains('on');

            let imageUrl = document.getElementById('category-photo-url').value;
            const photoFile = document.getElementById('category-photo-file').files[0];
            if (photoFile) {
                try {
                    imageUrl = await uploadFile(photoFile);
                } catch (error) {
                    showToast('Erreur upload photo', 'error');
                    return;
                }
            }

            try {
                if (state.currentEditingCategory) {
                    await updateCategory(state.currentEditingCategory.id, {
                        name,
                        family_id: familyId ? parseInt(familyId) : null,
                        visible,
                        image_url: imageUrl
                    });
                } else {
                    await apiCall('/categories', {
                        method: 'POST',
                        body: JSON.stringify({
                            name,
                            restaurant_id: state.restaurantId,
                            family_id: familyId ? parseInt(familyId) : null,
                            visible,
                            image_url: imageUrl
                        })
                    });
                }

                await loadCategories();
                renderCarte();
                renderOrganisation();
                updateKPI();
                document.getElementById('category-modal').classList.remove('active');
                showToast('Catégorie enregistrée', 'success');
            } catch (error) {
                console.error('Error:', error);
                showToast('Erreur lors de l\'enregistrement', 'error');
            }
        }

        async function handleFamilySubmit(e) {
            e.preventDefault();

            const name = document.getElementById('family-name').value;
            const photoFile = document.getElementById('family-photo-file').files[0];

            try {
                if (state.currentEditingFamily) {
                    await apiCall(`/families/${state.currentEditingFamily.id}`, {
                        method: 'PUT',
                        body: JSON.stringify({ name })
                    });
                } else {
                    await apiCall('/families', {
                        method: 'POST',
                        body: JSON.stringify({
                            name,
                            restaurant_id: state.restaurantId
                        })
                    });
                }

                await loadFamilies();
                renderCarte();
                renderOrganisation();
                updateKPI();
                document.getElementById('family-modal').classList.remove('active');
                showToast('Famille enregistrée', 'success');
            } catch (error) {
                console.error('Error:', error);
                showToast('Erreur lors de l\'enregistrement', 'error');
            }
        }

        // API UPDATE FUNCTIONS
        async function updateItem(id, updates) {
            await apiCall(`/items/${id}`, {
                method: 'PUT',
                body: JSON.stringify(updates)
            });
        }

        async function updateCategory(id, updates) {
            await apiCall(`/categories/${id}`, {
                method: 'PUT',
                body: JSON.stringify(updates)
            });
        }

        async function reorderCategory(categoryId, direction) {
            try {
                const currentIndex = state.categories.findIndex(c => c.id === categoryId);
                if (currentIndex === -1) return;

                const newIndex = currentIndex + direction;
                if (newIndex < 0 || newIndex >= state.categories.length) return;

                await apiCall(`/categories/${categoryId}/reorder`, {
                    method: 'POST',
                    body: JSON.stringify({ direction })
                });

                await loadCategories();
                renderCarte();
                renderOrganisation();
            } catch (error) {
                console.error('Error reordering:', error);
                showToast('Erreur lors du réordonnancement', 'error');
            }
        }

        // UTILS
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Save button
        document.getElementById('saveBtn').addEventListener('click', function() {
            const btn = this;
            btn.textContent = '✓';
            btn.classList.add('saved');
            showToast('Sauvegardé');
            setTimeout(() => { btn.textContent = '💾'; btn.classList.remove('saved'); }, 2200);
        });

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
