<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#060e1a">
<title>Scanner — Sauf Imprévu</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #060e1a; color: #fff; min-height: 100dvh; min-height: 100vh;
  font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
  display: flex; flex-direction: column;
  -webkit-font-smoothing: antialiased;
}
/* Header */
.scan-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; padding-top: calc(14px + env(safe-area-inset-top, 0px));
  flex-shrink: 0;
}
.scan-header h4 { font-size: 15px; font-weight: 700; }
.scan-header span { font-size: 11px; color: rgba(255,255,255,0.4); }
.scan-close {
  background: rgba(255,255,255,0.08); border: none; color: rgba(255,255,255,0.6);
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; cursor: pointer;
}
/* Camera view */
.camera-wrap {
  position: relative; width: 100%; max-width: 600px; margin: 0 auto;
  aspect-ratio: 1; max-height: 50vh; overflow: hidden;
  border-radius: 0; background: #000;
}
.camera-wrap video { width: 100%; height: 100%; object-fit: cover; }
.camera-wrap canvas { display: none; }
.scan-crosshair {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.crosshair-box {
  width: 220px; height: 220px; border: 2px solid rgba(100,200,255,0.5);
  border-radius: 16px; position: relative;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
}
.crosshair-corner { position: absolute; width: 24px; height: 24px; }
.crosshair-corner::before, .crosshair-corner::after {
  content: ''; position: absolute; background: #4AE88A;
}
.crosshair-corner::before { width: 24px; height: 3px; border-radius: 2px; }
.crosshair-corner::after  { width: 3px; height: 24px; border-radius: 2px; }
.cc-tl { top: -1px; left: -1px; }
.cc-tr { top: -1px; right: -1px; }
.cc-tr::before { right: 0; }
.cc-tr::after { right: 0; }
.cc-bl { bottom: -1px; left: -1px; }
.cc-bl::before { bottom: 0; }
.cc-bl::after { bottom: 0; }
.cc-br { bottom: -1px; right: -1px; }
.cc-br::before { right: 0; bottom: 0; }
.cc-br::after { right: 0; bottom: 0; }
.scan-hint {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  font-size: 12px; color: rgba(255,255,255,0.6); background: rgba(0,0,0,0.6);
  padding: 6px 16px; border-radius: 20px; white-space: nowrap;
  backdrop-filter: blur(8px);
}
.scan-line {
  position: absolute; left: 10%; width: 80%; height: 2px;
  background: linear-gradient(90deg, transparent, #4AE88A, transparent);
  animation: scan-move 2s ease-in-out infinite;
  box-shadow: 0 0 8px rgba(74,232,138,0.5);
}
@keyframes scan-move { 0%,100% { top: 30%; } 50% { top: 70%; } }

/* Scroll area */
.scan-content {
  flex: 1; overflow-y: auto; padding: 16px;
  max-width: 600px; width: 100%; margin: 0 auto;
  -webkit-overflow-scrolling: touch;
}

/* States */
.state { display: none; }
.state.active { display: block; }

/* Member card (after scan) */
.member-result {
  background: linear-gradient(135deg, #0d2a4a, #091828);
  border: 1px solid rgba(100,180,255,0.15); border-radius: 18px;
  padding: 20px; margin-bottom: 16px;
}
.mr-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.mr-name { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
.mr-id { font-size: 9px; color: rgba(255,255,255,0.3); font-family: monospace; margin-top: 3px; }
.mr-badge {
  font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 4px 10px; border-radius: 20px;
  background: linear-gradient(135deg, #8a6a20, #b8920a); border: 1px solid rgba(220,180,60,0.4);
}
.mr-stats {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px;
}
.mr-stat {
  background: rgba(255,255,255,0.04); border-radius: 10px; padding: 10px;
  text-align: center;
}
.mr-stat-val { font-size: 18px; font-weight: 800; }
.mr-stat-lbl { font-size: 8px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }
.mr-remise {
  background: rgba(74,232,138,0.08); border: 1px solid rgba(74,232,138,0.2);
  border-radius: 12px; padding: 12px 16px;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px;
}
.mr-remise-left { display: flex; flex-direction: column; gap: 2px; }
.mr-remise-label { font-size: 8px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.1em; }
.mr-remise-pct { font-size: 28px; font-weight: 800; color: #4AE88A; }
.mr-tips { font-size: 13px; font-weight: 600; color: rgba(100,180,255,0.8); }
.mr-tips small { font-size: 10px; color: rgba(255,255,255,0.3); }
.verified-badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; color: #4AE88A; letter-spacing: 0.08em;
}
.v-dot { width: 6px; height: 6px; border-radius: 50%; background: #4AE88A; animation: vp 1.5s ease-in-out infinite; }
@keyframes vp { 0%,100% { box-shadow: 0 0 0 0 rgba(74,232,138,0.5); } 50% { box-shadow: 0 0 0 4px rgba(74,232,138,0); } }

/* Payment form */
.pay-form {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px; padding: 20px;
}
.pay-title { font-size: 13px; font-weight: 700; margin-bottom: 14px; color: rgba(255,255,255,0.8); }
.pay-amount-wrap {
  display: flex; align-items: baseline; gap: 4px; margin-bottom: 16px;
  justify-content: center;
}
.pay-amount-input {
  background: none; border: none; outline: none; color: #fff;
  font-size: 48px; font-weight: 800; text-align: right;
  width: 160px; font-family: 'Plus Jakarta Sans', sans-serif;
  letter-spacing: -0.03em;
}
.pay-amount-input::placeholder { color: rgba(255,255,255,0.15); }
.pay-currency { font-size: 24px; font-weight: 600; color: rgba(255,255,255,0.4); }
.pay-summary {
  background: rgba(255,255,255,0.04); border-radius: 10px;
  padding: 12px; margin-bottom: 16px;
}
.pay-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
.pay-row-label { color: rgba(255,255,255,0.4); }
.pay-row-val { font-weight: 600; }
.pay-row-val.green { color: #4AE88A; }
.pay-row.total { border-top: 1px solid rgba(255,255,255,0.08); margin-top: 6px; padding-top: 8px; font-size: 15px; }
.pay-row.total .pay-row-val { font-size: 18px; font-weight: 800; }
.pay-btn {
  width: 100%; padding: 16px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, #1464B4, #2888d8);
  color: #fff; font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
  transition: opacity 0.15s;
}
.pay-btn:active { opacity: 0.7; }
.pay-btn:disabled { opacity: 0.3; cursor: default; }

/* Success state */
.success-card {
  text-align: center; padding: 40px 20px;
}
.success-icon { font-size: 64px; margin-bottom: 16px; }
.success-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.success-sub { font-size: 14px; color: rgba(255,255,255,0.4); margin-bottom: 24px; }
.success-amount { font-size: 42px; font-weight: 800; color: #4AE88A; margin-bottom: 6px; }
.success-detail { font-size: 12px; color: rgba(255,255,255,0.3); margin-bottom: 24px; }
.new-scan-btn {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  color: #fff; padding: 12px 32px; border-radius: 28px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
}

/* Error */
.error-msg {
  background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.2);
  border-radius: 12px; padding: 16px; text-align: center;
  color: #ff6b6b; font-size: 13px; font-weight: 600;
}
</style>
</head>
<body>

<div class="scan-header">
  <div>
    <h4>Scanner</h4>
    <span>OK Snap · Encaissement</span>
  </div>
  <button class="scan-close" onclick="closeScanPage()">&times;</button>
</div>

<!-- STATE: Camera -->
<div class="state active" id="stateScan">
  <div class="camera-wrap">
    <video id="camVideo" autoplay playsinline muted></video>
    <canvas id="camCanvas"></canvas>
    <div class="scan-crosshair">
      <div class="crosshair-box">
        <div class="crosshair-corner cc-tl"></div>
        <div class="crosshair-corner cc-tr"></div>
        <div class="crosshair-corner cc-bl"></div>
        <div class="crosshair-corner cc-br"></div>
      </div>
    </div>
    <div class="scan-line"></div>
    <div class="scan-hint" id="scanHint">Scannez la carte du client</div>
  </div>
</div>

<!-- STATE: Member found → payment -->
<div class="state" id="statePay">
  <div class="scan-content">
    <div class="member-result" id="memberResult"></div>
    <div class="pay-form">
      <div class="pay-title">Encaissement</div>
      <div class="pay-amount-wrap">
        <input type="number" class="pay-amount-input" id="payAmount" placeholder="0" inputmode="decimal" step="0.01" oninput="updatePaySummary()">
        <span class="pay-currency">&euro;</span>
      </div>
      <div class="pay-summary" id="paySummary"></div>
      <button class="pay-btn" id="payBtn" onclick="processPayment()" disabled>Encaisser</button>
    </div>
  </div>
</div>

<!-- STATE: Success -->
<div class="state" id="stateSuccess">
  <div class="scan-content">
    <div class="success-card" id="successCard"></div>
  </div>
</div>

<!-- STATE: Error -->
<div class="state" id="stateError">
  <div class="scan-content">
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
  var currentMember = null;

  // ── Close ──
  function closeScanPage() {
    stopCamera();
    if (window.parent !== window) {
      window.parent.postMessage('closeScan', '*');
      return;
    }
    if (history.length > 1) history.back();
    else window.location.href = '/';
  }

  // ── State machine ──
  function showState(id) {
    document.querySelectorAll('.state').forEach(function(s) { s.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
  }

  // ════════════════════════════════════════════════════
  // ── DOT CONSTELLATION DECODER ──
  // Lit une grille 14x14 de dots lumineux depuis la caméra
  // Même protocole que wallet.html : 4 coins sync, bordure, 12x12 data
  // ════════════════════════════════════════════════════

  var GRID = 14;

  // ── Sample brightness at a point (average of small area) ──
  function sampleBrightness(data, w, cx, cy, radius) {
    var sum = 0, count = 0;
    var r = Math.round(radius);
    var ix = Math.round(cx), iy = Math.round(cy);
    for (var dy = -r; dy <= r; dy++) {
      for (var dx = -r; dx <= r; dx++) {
        var px = ix + dx, py = iy + dy;
        if (px < 0 || py < 0 || px >= w || py >= Math.floor(data.length / 4 / w)) continue;
        var idx = (py * w + px) * 4;
        // Luminance weighted (the dots are blue-cyan, so emphasize blue channel)
        sum += data[idx] * 0.2 + data[idx + 1] * 0.3 + data[idx + 2] * 0.5;
        count++;
      }
    }
    return count > 0 ? sum / count : 0;
  }

  // ── Find the card region by looking for the 4 bright corner sync dots ──
  // Strategy: scan the frame for clusters of bright pixels, find 4 that form a square
  function findCorners(data, w, h) {
    // The crosshair guide is 220x220 centered in the camera view
    // We expect the card to be roughly in the center ~60% of frame
    var margin = Math.min(w, h) * 0.15;
    var searchW = w - margin * 2;
    var searchH = h - margin * 2;

    // Step: scan in a grid to find bright spots
    var step = Math.max(4, Math.floor(Math.min(w, h) / 80));
    var brightSpots = [];

    for (var y = margin; y < h - margin; y += step) {
      for (var x = margin; x < w - margin; x += step) {
        var b = sampleBrightness(data, w, x, y, 2);
        if (b > 130) { // bright enough to be a dot
          brightSpots.push({ x: x, y: y, b: b });
        }
      }
    }

    if (brightSpots.length < 4) return null;

    // Sort by brightness descending
    brightSpots.sort(function(a, b) { return b.b - a.b; });

    // Cluster nearby spots (merge within 20px)
    var clusters = [];
    var used = {};
    for (var i = 0; i < brightSpots.length; i++) {
      if (used[i]) continue;
      var cl = { x: brightSpots[i].x, y: brightSpots[i].y, b: brightSpots[i].b, n: 1 };
      used[i] = true;
      for (var j = i + 1; j < brightSpots.length; j++) {
        if (used[j]) continue;
        var dx = brightSpots[j].x - cl.x / cl.n * cl.n;
        var dy = brightSpots[j].y - cl.y / cl.n * cl.n;
        // Simpler: distance to cluster center
        var dcx = brightSpots[j].x - cl.x / cl.n;
        var dcy = brightSpots[j].y - cl.y / cl.n;
        if (Math.abs(brightSpots[j].x - cl.x / cl.n) < 25 &&
            Math.abs(brightSpots[j].y - cl.y / cl.n) < 25) {
          cl.x += brightSpots[j].x;
          cl.y += brightSpots[j].y;
          cl.b = Math.max(cl.b, brightSpots[j].b);
          cl.n++;
          used[j] = true;
        }
      }
      clusters.push({ x: cl.x / cl.n, y: cl.y / cl.n, b: cl.b });
    }

    if (clusters.length < 4) return null;

    // Find best 4 clusters that form a roughly square shape
    // Take the 8 brightest, try combinations of 4
    var top = clusters.slice(0, Math.min(12, clusters.length));

    var bestScore = Infinity;
    var bestCorners = null;

    // Try all combinations of 4 from top clusters
    for (var a = 0; a < top.length - 3; a++) {
      for (var b = a + 1; b < top.length - 2; b++) {
        for (var c = b + 1; c < top.length - 1; c++) {
          for (var d = c + 1; d < top.length; d++) {
            var pts = [top[a], top[b], top[c], top[d]];
            var sq = evaluateSquare(pts);
            if (sq && sq.score < bestScore) {
              bestScore = sq.score;
              bestCorners = sq.corners;
            }
          }
        }
      }
    }

    return bestCorners;
  }

  // ── Evaluate if 4 points form a square-ish shape ──
  function evaluateSquare(pts) {
    // Sort: top-left, top-right, bottom-left, bottom-right
    pts.sort(function(a, b) { return a.y - b.y; });
    var topTwo = pts.slice(0, 2).sort(function(a, b) { return a.x - b.x; });
    var botTwo = pts.slice(2, 4).sort(function(a, b) { return a.x - b.x; });
    var tl = topTwo[0], tr = topTwo[1], bl = botTwo[0], br = botTwo[1];

    // Check it's roughly square (aspect ratio 0.6-1.6)
    var topW = Math.sqrt(Math.pow(tr.x - tl.x, 2) + Math.pow(tr.y - tl.y, 2));
    var leftH = Math.sqrt(Math.pow(bl.x - tl.x, 2) + Math.pow(bl.y - tl.y, 2));
    if (topW < 30 || leftH < 30) return null; // too small
    var ratio = topW / leftH;
    if (ratio < 0.6 || ratio > 1.6) return null;

    // Check diagonals are similar length
    var d1 = Math.sqrt(Math.pow(br.x - tl.x, 2) + Math.pow(br.y - tl.y, 2));
    var d2 = Math.sqrt(Math.pow(bl.x - tr.x, 2) + Math.pow(bl.y - tr.y, 2));
    var diagRatio = d1 / d2;
    if (diagRatio < 0.7 || diagRatio > 1.4) return null;

    // Score: how close to a perfect square (lower = better)
    var score = Math.abs(ratio - 1) + Math.abs(diagRatio - 1);
    return { score: score, corners: { tl: tl, tr: tr, bl: bl, br: br } };
  }

  // ── Read the constellation grid using corner positions ──
  function readConstellationGrid(data, w, h, corners) {
    var grid = [];
    var allBrightness = [];

    for (var r = 0; r < GRID; r++) {
      grid[r] = [];
      for (var c = 0; c < GRID; c++) {
        // Bilinear interpolation from corners to find cell center
        var fx = (c + 0.5) / GRID;
        var fy = (r + 0.5) / GRID;
        var topX = corners.tl.x + (corners.tr.x - corners.tl.x) * fx;
        var topY = corners.tl.y + (corners.tr.y - corners.tl.y) * fx;
        var botX = corners.bl.x + (corners.br.x - corners.bl.x) * fx;
        var botY = corners.bl.y + (corners.br.y - corners.bl.y) * fx;
        var px = topX + (botX - topX) * fy;
        var py = topY + (botY - topY) * fy;

        var bright = sampleBrightness(data, w, px, py, 3);
        grid[r][c] = bright;
        allBrightness.push(bright);
      }
    }

    // Validate sync corners are bright
    var cornerBright = [grid[0][0], grid[0][GRID - 1], grid[GRID - 1][0], grid[GRID - 1][GRID - 1]];
    var avgCorner = (cornerBright[0] + cornerBright[1] + cornerBright[2] + cornerBright[3]) / 4;
    if (avgCorner < 80) return null; // Corners not bright enough

    // Calculate threshold using border sync pattern
    // Border dots alternate: even positions = ON, odd = OFF
    var onVals = [], offVals = [];
    for (var c = 1; c < GRID - 1; c++) {
      if (c % 2 === 0) { onVals.push(grid[0][c]); onVals.push(grid[GRID - 1][c]); }
      else { offVals.push(grid[0][c]); offVals.push(grid[GRID - 1][c]); }
    }
    for (var r = 1; r < GRID - 1; r++) {
      if (r % 2 === 0) { onVals.push(grid[r][0]); onVals.push(grid[r][GRID - 1]); }
      else { offVals.push(grid[r][0]); offVals.push(grid[r][GRID - 1]); }
    }

    if (onVals.length === 0 || offVals.length === 0) return null;
    var avgOn = onVals.reduce(function(a, b) { return a + b; }, 0) / onVals.length;
    var avgOff = offVals.reduce(function(a, b) { return a + b; }, 0) / offVals.length;

    // Need reasonable separation between ON and OFF
    if (avgOn - avgOff < 15) return null; // Not enough contrast

    var threshold = (avgOn + avgOff) / 2;

    // Read interior 12x12 data bits
    var bits = [];
    for (var r = 1; r <= 12; r++) {
      for (var c = 1; c <= 12; c++) {
        bits.push(grid[r][c] > threshold ? 1 : 0);
      }
    }

    return bits;
  }

  // ── Decode bits → member payload ──
  function decodeBitsToMember(bits) {
    if (bits.length < 120) return null;

    // Convert 120 bits → 15 bytes
    var bytes = new Uint8Array(15);
    for (var i = 0; i < 15; i++) {
      var byte = 0;
      for (var b = 0; b < 8; b++) {
        byte = (byte << 1) | bits[i * 8 + b];
      }
      bytes[i] = byte;
    }

    // Check magic byte
    if (bytes[0] !== 0xAA) return null;

    // Check XOR checksum
    var xor = 0;
    for (var i = 0; i < 14; i++) xor ^= bytes[i];
    if (xor !== bytes[14]) return null;

    // Decode fields
    var id = String.fromCharCode(bytes[1], bytes[2], bytes[3], bytes[4]);
    var levelCode = (bytes[5] >> 5) & 0x07;
    var level = levelCode === 1 ? 'GOLD' : levelCode === 2 ? 'PLATINUM' : 'SILVER';
    var remise = bytes[5] & 0x1F;
    var visits = (bytes[6] << 8) | bytes[7];
    var avg_basket = (bytes[8] << 8) | bytes[9];
    var tips = (bytes[10] << 8) | bytes[11];
    var secSinceMidnight = (bytes[12] << 8) | bytes[13];

    // Freshness check: timestamp should be within last 90 seconds
    var now = new Date();
    var nowSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
    var diff = Math.abs(nowSec - secSinceMidnight);
    if (diff > 86400 / 2) diff = 86400 - diff; // handle midnight wrap
    if (diff > 90) return null; // expired

    return {
      id: id,
      name: 'Membre ' + id, // POC: name not in compact payload, would come from server
      level: level,
      visits: visits,
      avg_basket: avg_basket,
      remise: remise,
      tips: tips,
      network: ['SAUF_IMPREVU']
    };
  }

  // ════════════════════════════════════════════════════
  // ── CAMERA + SCANNING ──
  // ════════════════════════════════════════════════════

  var video, canvas, ctx, camStream, scanning = false;
  var constellationAttempts = 0;
  var MAX_CONSTELLATION_ATTEMPTS = 5; // frames between constellation decode tries (expensive)

  function startCamera() {
    video = document.getElementById('camVideo');
    canvas = document.getElementById('camCanvas');
    ctx = canvas.getContext('2d', { willReadFrequently: true });
    constellationAttempts = 0;

    navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 640 } }
    }).then(function(stream) {
      camStream = stream;
      video.srcObject = stream;
      video.onloadedmetadata = function() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        scanning = true;
        scanFrame();
      };
    }).catch(function(err) {
      document.getElementById('scanHint').textContent = 'Caméra non disponible';
      checkUrlToken();
    });
  }

  function stopCamera() {
    scanning = false;
    if (camStream) {
      camStream.getTracks().forEach(function(t) { t.stop(); });
      camStream = null;
    }
  }

  function scanFrame() {
    if (!scanning) return;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var w = canvas.width, h = canvas.height;

    // ── 1. Try QR code (fast, backwards compatible) ──
    var code = jsQR(imageData.data, w, h, { inversionAttempts: 'attemptBoth' });
    if (code && code.data) {
      var match = code.data.match(/[?&]token=([^&]+)/);
      if (match) {
        scanning = false;
        stopCamera();
        processToken(match[1]);
        return;
      }
    }

    // ── 2. Try constellation decode (every N frames — heavier computation) ──
    constellationAttempts++;
    if (constellationAttempts >= MAX_CONSTELLATION_ATTEMPTS) {
      constellationAttempts = 0;
      var corners = findCorners(imageData.data, w, h);
      if (corners) {
        var bits = readConstellationGrid(imageData.data, w, h, corners);
        if (bits) {
          var member = decodeBitsToMember(bits);
          if (member) {
            scanning = false;
            stopCamera();
            document.getElementById('scanHint').textContent = 'Carte détectée !';
            currentMember = member;
            showMember(member);
            return;
          }
        }
      }
    }

    requestAnimationFrame(scanFrame);
  }

  // ── Legacy token decode (QR fallback) ──
  function processToken(token) {
    try {
      var json = decodeURIComponent(escape(atob(token)));
      var data = JSON.parse(json);
      if (data.exp && Date.now() > data.exp) {
        showError('Token expiré. Demandez au client de renouveler.');
        return;
      }
      currentMember = data;
      showMember(data);
    } catch(e) {
      showError('Carte invalide.');
    }
  }

  function showError(msg) {
    document.getElementById('errorMsg').innerHTML = msg +
      '<br><button class="new-scan-btn" style="margin-top:16px;" onclick="resetScan()">Nouveau scan</button>';
    showState('stateError');
  }

  // ── Show member ──
  function showMember(m) {
    var tipsEur = (m.tips / 100).toFixed(2).replace('.', ',');
    var networkLabel = m.network && m.network[0] ? m.network[0].replace(/_/g, ' ') : 'OK Snap';
    var html =
      '<div class="mr-top">' +
        '<div><div class="mr-name">' + (m.name || 'Membre') + '</div><div class="mr-id">' + m.id + '</div></div>' +
        '<div class="mr-badge">' + m.level + '</div>' +
      '</div>' +
      '<div class="mr-stats">' +
        '<div class="mr-stat"><div class="mr-stat-val">' + m.visits + '</div><div class="mr-stat-lbl">Visites</div></div>' +
        '<div class="mr-stat"><div class="mr-stat-val">' + m.avg_basket + '&euro;</div><div class="mr-stat-lbl">Panier moy.</div></div>' +
        '<div class="mr-stat"><div class="mr-stat-val">' + m.remise + '%</div><div class="mr-stat-lbl">Remise</div></div>' +
      '</div>' +
      '<div class="mr-remise">' +
        '<div class="mr-remise-left">' +
          '<div class="mr-remise-label">Remise accord\u00e9e</div>' +
          '<div class="mr-remise-pct">' + m.remise + '%</div>' +
        '</div>' +
        '<div class="mr-tips">' + tipsEur + ' &euro;<br><small>Cagnotte Tips</small></div>' +
      '</div>' +
      '<div class="verified-badge"><div class="v-dot"></div> Certifi\u00e9 ' + networkLabel + '</div>';

    document.getElementById('memberResult').innerHTML = html;
    document.getElementById('payAmount').value = '';
    updatePaySummary();
    showState('statePay');
    document.getElementById('payAmount').focus();
  }

  // ── Payment ──
  function updatePaySummary() {
    var amount = parseFloat(document.getElementById('payAmount').value) || 0;
    var btn = document.getElementById('payBtn');
    var summary = document.getElementById('paySummary');

    if (!currentMember || amount <= 0) {
      summary.innerHTML = '';
      btn.disabled = true;
      return;
    }

    var remise = currentMember.remise;
    var discount = amount * remise / 100;
    var total = amount - discount;

    summary.innerHTML =
      '<div class="pay-row"><span class="pay-row-label">Montant</span><span class="pay-row-val">' + amount.toFixed(2) + ' &euro;</span></div>' +
      '<div class="pay-row"><span class="pay-row-label">Remise ' + remise + '%</span><span class="pay-row-val green">&minus; ' + discount.toFixed(2) + ' &euro;</span></div>' +
      '<div class="pay-row total"><span class="pay-row-label">\u00c0 payer</span><span class="pay-row-val">' + total.toFixed(2) + ' &euro;</span></div>';

    btn.disabled = false;
    btn.textContent = 'Encaisser ' + total.toFixed(2) + ' \u20ac';
  }

  function processPayment() {
    var amount = parseFloat(document.getElementById('payAmount').value) || 0;
    var discount = amount * currentMember.remise / 100;
    var total = amount - discount;

    document.getElementById('successCard').innerHTML =
      '<div class="success-icon">\u2705</div>' +
      '<div class="success-title">Paiement valid\u00e9</div>' +
      '<div class="success-sub">' + (currentMember.name || 'Membre') + ' \u00b7 ' + currentMember.level + '</div>' +
      '<div class="success-amount">' + total.toFixed(2) + ' &euro;</div>' +
      '<div class="success-detail">Montant initial ' + amount.toFixed(2) + ' &euro; \u00b7 Remise \u2212' + discount.toFixed(2) + ' &euro;</div>' +
      '<button class="new-scan-btn" onclick="resetScan()">Nouveau scan</button>';

    showState('stateSuccess');
  }

  // ── Reset ──
  function resetScan() {
    currentMember = null;
    showState('stateScan');
    startCamera();
  }

  // ── Check URL token (if opened via direct link) ──
  function checkUrlToken() {
    var params = new URLSearchParams(window.location.search);
    var token = params.get('token');
    if (token) {
      processToken(token);
    }
  }

  // ── Init ──
  checkUrlToken();
  if (!new URLSearchParams(window.location.search).get('token')) {
    startCamera();
  }
</script>
</body>
</html>
