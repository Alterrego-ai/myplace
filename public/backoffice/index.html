                // Conteneur Lottie
                const lottieContainer = document.createElement('div');
                lottieContainer.style.cssText = 'position:absolute;top:0;left:0;right:0;bottom:0;z-index:6;pointer-events:none;display:flex;align-items:center;justify-content:center;';
                overlay.appendChild(lottieContainer);

                // Texte bienvenue
                const welcomeText = document.createElement('div');
                welcomeText.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:7;pointer-events:none;text-align:center;opacity:0;transition:opacity 0.6s ease;';
                welcomeText.innerHTML = `
                    <div style="font-size:2rem;font-weight:900;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,0.5);letter-spacing:0.02em;">Bienvenue</div>
                    <div style="font-size:1.6rem;font-weight:700;color:rgba(255,255,255,0.95);margin-top:0.4rem;text-shadow:0 2px 12px rgba(0,0,0,0.5);letter-spacing:0.03em;">chez Sauf Imprévu</div>
                `;
                overlay.appendChild(welcomeText);

                // Couche AR (cartes) — cachée initialement
                const arLayer = document.createElement('div');
                arLayer.style.cssText = 'position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;perspective:800px;overflow:hidden;';
                overlay.appendChild(arLayer);

                // Header
                const header = document.createElement('div');
                header.style.cssText = 'position:absolute;top:0;left:0;right:0;padding:1rem;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(0,0,0,0.6),transparent);z-index:10;';
                header.innerHTML = '<span style="color:#fff;font-weight:700;font-size:1rem;">AR Menu — Sauf Imprévu</span>';
                const closeBtn = document.createElement('button');
                closeBtn.textContent = '✕';
                closeBtn.style.cssText = 'background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:1.2rem;width:36px;height:36px;border-radius:50%;cursor:pointer;pointer-events:auto;';
                closeBtn.addEventListener('click', closeAR);
                header.appendChild(closeBtn);
                overlay.appendChild(header);

                // Footer hint
                const footer = document.createElement('div');
                footer.style.cssText = 'position:absolute;bottom:0;left:0;right:0;padding:1.5rem;text-align:center;background:linear-gradient(to top,rgba(0,0,0,0.6),transparent);z-index:10;opacity:0;transition:opacity 0.5s ease;';
                footer.innerHTML = '<span style="color:rgba(255,255,255,0.7);font-size:0.8rem;">Bougez le téléphone pour explorer les plats</span>';
                overlay.appendChild(footer);

                document.body.appendChild(overlay);

                // Démarrer la caméra
                let stream = null;
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    video.srcObject = stream;
                    video.play();
                } catch (e) {
                    video.style.background = 'linear-gradient(135deg, #1a1a2e, #16213e)';
                }

                // ============================================================
                // PHASE 1 : Lottie confettis + texte bienvenue (0 → 2.5s)
                // ============================================================
                let lottieAnim = null;
                try {
                    lottieAnim = lottie.loadAnimation({
                        container: lottieContainer,
                        renderer: 'svg',
                        loop: false,
                        autoplay: true,
                        path: 'https://assets2.lottiefiles.com/packages/lf20_u4yrau.json'
                    });
                } catch(e) {
                    // Fallback : pas de lottie, on continue
                }

                // Texte bienvenue apparaît
                setTimeout(() => { welcomeText.style.opacity = '1'; }, 300);

                // ============================================================
                // PHASE 2 : Feu d'artifice Canvas (1.5s → 3.5s)
                // ============================================================
                const vw = window.innerWidth;
                const vh = window.innerHeight;
                fwCanvas.width = vw;
                fwCanvas.height = vh;
                const ctx = fwCanvas.getContext('2d');

                const particles = [];
                const fwColors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6eb4','#a66cff','#fff'];

                function spawnBurst(x, y, count) {
                    for (let i = 0; i < count; i++) {
                        const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.3;
                        const speed = 2 + Math.random() * 4;
                        particles.push({
                            x, y,
                            vx: Math.cos(angle) * speed,
                            vy: Math.sin(angle) * speed,
                            life: 1,
                            decay: 0.012 + Math.random() * 0.015,
                            color: fwColors[Math.floor(Math.random() * fwColors.length)],
                            size: 2 + Math.random() * 3,
                            trail: []
                        });
                    }
                }

                let fwRunning = false;
                function animateFireworks() {
                    if (!fwRunning) return;
                    ctx.clearRect(0, 0, vw, vh);
                    for (let i = particles.length - 1; i >= 0; i--) {
                        const p = particles[i];
                        p.trail.push({ x: p.x, y: p.y, life: p.life });
                        if (p.trail.length > 6) p.trail.shift();
                        p.x += p.vx;
                        p.y += p.vy;
                        p.vy += 0.04; // gravité légère
                        p.vx *= 0.99;
                        p.life -= p.decay;

                        // Traînée
                        p.trail.forEach((t, ti) => {
                            ctx.globalAlpha = t.life * (ti / p.trail.length) * 0.4;
                            ctx.fillStyle = p.color;
                            ctx.beginPath();
                            ctx.arc(t.x, t.y, p.size * 0.5, 0, Math.PI * 2);
                            ctx.fill();
                        });

                        // Particule principale
                        ctx.globalAlpha = p.life;
                        ctx.fillStyle = p.color;
                        ctx.shadowColor = p.color;
                        ctx.shadowBlur = 8;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;

                        if (p.life <= 0) particles.splice(i, 1);
                    }
                    ctx.globalAlpha = 1;
                    requestAnimationFrame(animateFireworks);
                }

                // Lancer les feux d'artifice après 1.2s
                setTimeout(() => {
                    fwRunning = true;
                    animateFireworks();
                    // Burst 1 — centre
                    spawnBurst(vw * 0.5, vh * 0.35, 50);
                    // Burst 2 — gauche
                    setTimeout(() => spawnBurst(vw * 0.25, vh * 0.3, 40), 300);
                    // Burst 3 — droite
                    setTimeout(() => spawnBurst(vw * 0.75, vh * 0.25, 40), 500);
                    // Burst 4 — centre bas
                    setTimeout(() => spawnBurst(vw * 0.5, vh * 0.5, 35), 750);
                    // Burst 5 — final grand
                    setTimeout(() => spawnBurst(vw * 0.4, vh * 0.4, 60), 1000);
                    setTimeout(() => spawnBurst(vw * 0.6, vh * 0.35, 60), 1100);
                }, 1200);

                // ============================================================
                // PHASE 3 : Disparition intro + apparition des cartes (3.5s →)
                // ============================================================
                setTimeout(() => {
                    // Fade out welcome + lottie
                    welcomeText.style.opacity = '0';
                    lottieContainer.style.transition = 'opacity 0.5s ease';
                    lottieContainer.style.opacity = '0';
                    // Arrêter feu d'artifice
                    setTimeout(() => {
                        fwRunning = false;
                        ctx.clearRect(0, 0, vw, vh);
                        fwCanvas.style.display = 'none';
                        lottieContainer.remove();
                        welcomeText.remove();
                        if (lottieAnim) { try { lottieAnim.destroy(); } catch(e){} }
                    }, 600);
                    // Montrer footer hint
                    footer.style.opacity = '1';
                }, 3500);

                // Créer les cartes plat (cachées, apparaissent en cascade à 4s)
                const cards = [];

                items.forEach((item, i) => {
                    const card = document.createElement('div');
                    card.style.cssText = `
                        position:absolute;
                        pointer-events:auto;
                        background:rgba(255,255,255,0.92);
                        backdrop-filter:blur(12px);
                        -webkit-backdrop-filter:blur(12px);
                        border-radius:14px;
                        padding:0.85rem 1rem;
                        width:180px;
                        box-shadow:0 8px 32px rgba(0,0,0,0.3);
                        border:1px solid rgba(255,255,255,0.3);
                        transition:transform 0.1s ease-out;
                        cursor:pointer;
                        opacity:0;
                        transform:scale(0.3) translateY(60px);
                    `;

                    const tags = item.tags || [];
                    let tagIcons = '';
                    if (tags.length && carteState && carteState.tagLookup) {
                        const icons = tags.slice(0, 3).map(tid => {
                            const t = carteState.tagLookup[tid];
                            return t && t.icon ? t.icon : '';
                        }).filter(Boolean);
                        if (icons.length) tagIcons = `<div style="margin-top:0.3rem;font-size:0.85rem;">${icons.join(' ')}</div>`;
                    }

                    card.innerHTML = `
                        <div style="font-weight:800;font-size:0.88rem;color:#1a2332;line-height:1.2;">${item.name}</div>
                        ${item.description ? `<div style="font-size:0.72rem;color:#8a9bb0;margin-top:0.2rem;">${item.description}</div>` : ''}
                        ${tagIcons}
                        <div style="font-size:1.1rem;font-weight:800;color:#3d5a80;margin-top:0.4rem;">${item.price}€</div>
                    `;

                    // Position en cercle
                    const angle = (i / items.length) * Math.PI * 2;
                    const radius = Math.min(vw, vh) * 0.25;
                    const cx = vw / 2 + Math.cos(angle) * radius - 90;
                    const cy = vh / 2 + Math.sin(angle) * radius - 40;

                    card.dataset.baseX = cx;
                    card.dataset.baseY = cy;
                    card.dataset.depth = (0.6 + Math.random() * 0.8).toFixed(2);
                    card.style.left = cx + 'px';
                    card.style.top = cy + 'px';

                    // Apparition en cascade à partir de 4s
                    setTimeout(() => {
                        card.style.transition = 'opacity 0.6s cubic-bezier(0.34,1.56,0.64,1), transform 0.6s cubic-bezier(0.34,1.56,0.64,1)';
                        card.style.opacity = '1';
                        card.style.transform = 'scale(1) translateY(0)';
                    }, 4000 + i * 200);

                    // Tap → agrandir
                    card.addEventListener('click', () => {
                        if (card.dataset.expanded === '1') {
                            card.style.transform = 'scale(1)';
                            card.dataset.expanded = '0';
                        } else {
                            card.style.transform = 'scale(1.15)';
                            card.style.zIndex = '10';
                            card.dataset.expanded = '1';
                        }
                    });

                    arLayer.appendChild(card);
                    cards.push(card);
                });

                // Gyroscope parallax
                let gyroX = 0, gyroY = 0;
                function onOrientation(e) {
                    gyroX = (e.gamma || 0);
                    gyroY = (e.beta || 0) - 45;
                }

                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const perm = await DeviceOrientationEvent.requestPermission();
                        if (perm === 'granted') window.addEventListener('deviceorientation', onOrientation);
                    } catch (e) {}
                } else {
                    window.addEventListener('deviceorientation', onOrientation);
                }

                // Animation loop
                let arRunning = true;
                function animateAR() {
                    if (!arRunning) return;
                    cards.forEach(card => {
                        const depth = parseFloat(card.dataset.depth);
                        const bx = parseFloat(card.dataset.baseX);
                        const by = parseFloat(card.dataset.baseY);
                        const dx = gyroX * depth * 2;
                        const dy = gyroY * depth * 1.5;
                        card.style.left = (bx + dx) + 'px';
                        card.style.top = (by + dy) + 'px';
                    });
                    requestAnimationFrame(animateAR);
                }
                animateAR();

                // Floating animation subtile
                let floatTime = 0;
                function floatAnim() {
                    if (!arRunning) return;
                    floatTime += 0.02;
                    cards.forEach((card, i) => {
                        const offset = Math.sin(floatTime + i * 1.2) * 3;
                        card.style.marginTop = offset + 'px';
                    });
                    requestAnimationFrame(floatAnim);
                }
                floatAnim();

                function closeAR() {
                    arRunning = false;
                    fwRunning = false;
                    window.removeEventListener('deviceorientation', onOrientation);
                    if (stream) stream.getTracks().forEach(t => t.stop());
                    if (lottieAnim) { try { lottieAnim.destroy(); } catch(e){} }
                    overlay.remove();
                }
            }
        }

        // AUTH — géré par l'app principale (index.html), pas besoin ici

        // QR SCANNER
        // ============================================================================
        {
            const scanBtn = document.getElementById('openScannerBtn');
            let scannerActive = false;

            scanBtn.addEventListener('click', () => {
                if (scannerActive) return;
                openScanner();
            });

            function openScanner() {
                scannerActive = true;

                const overlay = document.createElement('div');
                overlay.className = 'scanner-overlay';

                overlay.innerHTML = `
                    <div class="scanner-header">
                        <span class="scanner-header-title">Scanner un QR code</span>
                        <button class="scanner-close-btn" id="scannerCloseBtn">&times;</button>
                    </div>
                    <div class="scanner-video-wrap">
                        <video id="scannerVideo" autoplay playsinline></video>
                        <div class="scanner-frame"></div>
                    </div>
                    <div class="scanner-result" id="scannerResult">Placez un QR code dans le cadre...</div>
                `;

                document.body.appendChild(overlay);

                const video = document.getElementById('scannerVideo');
                const resultDiv = document.getElementById('scannerResult');
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                let stream = null;
                let animFrame = null;

                function closeScanner() {
                    scannerActive = false;
                    if (animFrame) cancelAnimationFrame(animFrame);
                    if (stream) stream.getTracks().forEach(t => t.stop());
                    overlay.remove();
                }

                document.getElementById('scannerCloseBtn').addEventListener('click', closeScanner);

                navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                }).then(s => {
                    stream = s;
                    video.srcObject = s;
                    video.play();
                    requestAnimationFrame(tick);
                }).catch(err => {
                    resultDiv.textContent = 'Impossible d\'accéder à la caméra';
                    console.error('Camera error:', err);
                });

                function tick() {
                    if (!scannerActive) return;
                    if (video.readyState === video.HAVE_ENOUGH_DATA) {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const code = jsQR(imageData.data, imageData.width, imageData.height, {
                            inversionAttempts: 'dontInvert'
                        });

                        if (code) {
                            handleQRResult(code.data);
                            closeScanner();
                            return;
                        }
                    }
                    animFrame = requestAnimationFrame(tick);
                }
            }

            function handleQRResult(data) {
                alert(data);
            }

            // Auto-open depuis raccourci PWA (?action=scan, ?action=resa, ?section=carte)
            const urlParams = new URLSearchParams(window.location.search);
            const action = urlParams.get('action');
            const sectionParam = urlParams.get('section');
            if (action === 'scan') {
                setTimeout(() => openScanner(), 300);
                history.replaceState(null, '', window.location.pathname);
            } else if (action === 'resa') {
                setTimeout(() => document.getElementById('openAddResaBtn').click(), 300);
                history.replaceState(null, '', window.location.pathname);
            } else if (sectionParam) {
                // Ouvrir directement sur l'onglet demandé (ex: ?section=carte)
                const targetTab = document.querySelector(`.nav-tab[data-section="${sectionParam}"]`);
                if (targetTab) {
                    setTimeout(() => targetTab.click(), 100);
                }
                history.replaceState(null, '', window.location.pathname);
            }
        }

        // ============================================================================
        // SERVICE WORKER
        // ============================================================================

        if ('serviceWorker' in navigator) {
            // Reload auto quand un nouveau SW prend le contrôle
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                refreshing = true;
                window.location.reload();
            });

            navigator.serviceWorker.register('/backoffice/sw.js').then(reg => {
                // Le navigateur check le SW toutes les 24h automatiquement
                // + à chaque navigation. Le controllerchange ci-dessus gère le reload.
            }).catch(err => {
                console.warn('Service worker registration failed:', err);
            });
        }

        // ============================================================================
        // INITIALIZATION
        // ============================================================================

        window.addEventListener('load', () => {
            // Sync header height → main margin
            const hdr = document.querySelector('header');
            document.documentElement.style.setProperty('--header-h', hdr.offsetHeight + 'px');

            loadCarteData();
            loadReservations();

            // Charger le hash de commit dans le footer
            fetch('/api/version')
                .then(r => r.json())
                .then(v => {
                    document.getElementById('versionFooter').textContent = `v${v.hash}`;
                })
                .catch(() => {});
        });
    </script>
</body>
</html>
