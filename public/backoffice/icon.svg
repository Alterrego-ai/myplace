<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d5a80"/>
      <stop offset="100%" stop-color="#2e4a6e"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Wine glass -->
  <g transform="translate(256,260)" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Bowl -->
    <path d="M-60,-120 C-60,-120 -65,-40 0,10 65,-40 60,-120 60,-120" fill="rgba(255,255,255,0.15)" stroke="#ffffff"/>
    <!-- Wine fill -->
    <path d="M-52,-70 C-52,-70 -45,-25 0,5 45,-25 52,-70 52,-70" fill="rgba(255,255,255,0.25)" stroke="none"/>
    <!-- Stem -->
    <line x1="0" y1="10" x2="0" y2="100"/>
    <!-- Base -->
    <line x1="-45" y1="100" x2="45" y2="100"/>
  </g>
</svg>
