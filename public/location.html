<!DOCTYPE html>
<html lang="fr" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#3D6B8C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Nous trouver — Sauf Imprévu</title>
<!-- Inter removed: using native -apple-system (SF) to eliminate FOUT -->
<style>
:root {
  --primary: #3D6B8C;
  --primary-light: #5a8aab;
  --primary-dark: #2a4f6b;
  --accent: #c8a96e;
  --radius: 16px;
  --radius-sm: 10px;
  --font: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', 'Segoe UI', sans-serif;
  --bg: #f7f8fa;
  --bg-card: #ffffff;
  --bg-subtle: #f0f3f7;
  --text: #1a2332;
  --text-secondary: #5a6a7e;
  --text-tertiary: #8a9ab0;
  --border: rgba(0,0,0,0.07);
}
[data-theme="dark"] {
  --bg: #0f1923; --bg-card: #1a2636; --bg-subtle: #212f3f;
  --text: #eef2f7; --text-secondary: #8fa3bb; --text-tertiary: #5a7288;
  --border: rgba(255,255,255,0.07);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #0f1923; --bg-card: #1a2636; --bg-subtle: #212f3f;
    --text: #eef2f7; --text-secondary: #8fa3bb; --text-tertiary: #5a7288;
    --border: rgba(255,255,255,0.07);
  }
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; font-family: var(--font);
  background: var(--bg); color: var(--text);
  -webkit-font-smoothing: antialiased;
}
.loc-page {
  display: flex; flex-direction: column;
  height: 100dvh; height: 100vh;
  max-width: 600px; margin: 0 auto;
}
/* Header — premium style */
.loc-header {
  position: relative; overflow: hidden;
  padding: 20px 20px 22px;
  padding-top: calc(18px + env(safe-area-inset-top, 0px));
  background: linear-gradient(160deg, #1a2636 0%, var(--primary-dark) 40%, var(--primary) 100%);
  color: #fff; flex-shrink: 0;
}
.loc-header::before {
  content: ''; position: absolute; top: -40%; right: -20%;
  width: 240px; height: 240px; border-radius: 50%;
  background: radial-gradient(circle, rgba(200,169,110,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.loc-header::after {
  content: ''; position: absolute; bottom: -60%; left: -10%;
  width: 180px; height: 180px; border-radius: 50%;
  background: radial-gradient(circle, rgba(90,138,171,0.15) 0%, transparent 70%);
  pointer-events: none;
}
.loc-header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; position: relative; z-index: 1;
}
.loc-header-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.1); backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 5px 12px; border-radius: 20px;
  font-size: 11px; font-weight: 500; letter-spacing: 0.03em;
}
.loc-header-badge svg { opacity: 0.9; }
.loc-header-close {
  background: rgba(255,255,255,0.1); backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: none; color: #fff;
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; cursor: pointer; transition: background 0.15s;
}
.loc-header-close:active { background: rgba(255,255,255,0.2); }
.loc-header-info { position: relative; z-index: 1; }
.loc-header-info h4 {
  font-size: 22px; font-weight: 700; margin: 0; letter-spacing: -0.02em;
}
.loc-header-info p {
  font-size: 13px; opacity: 0.7; margin-top: 3px; font-weight: 400;
}
.loc-header-accent {
  position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent), rgba(200,169,110,0.2), transparent);
}
/* Map */
.loc-map {
  flex-shrink: 0; position: relative;
  height: 45vh; min-height: 200px; max-height: 380px;
  background: var(--bg-subtle);
  transition: height 0.3s ease, max-height 0.3s ease;
}
.loc-map.expanded {
  height: calc(100vh - 60px); max-height: none;
}
.loc-map iframe {
  width: 100%; height: 100%; border: none;
}
.loc-map-expand {
  position: absolute; bottom: 12px; right: 12px; z-index: 10;
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--bg-card); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  transition: background 0.12s;
}
.loc-map-expand:active { background: var(--bg-subtle); }
/* Content */
.loc-content {
  flex: 1; overflow-y: auto; padding: 16px;
  -webkit-overflow-scrolling: touch;
}
/* Address card (cliquable pour copier) */
.loc-address {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 16px 18px;
  margin-bottom: 14px; display: flex; align-items: center; gap: 14px;
  cursor: pointer; transition: background 0.12s;
}
.loc-address:active { background: var(--bg-subtle); }
.loc-address-icon {
  width: 44px; height: 44px; border-radius: 12px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.loc-address-text { flex: 1; }
.loc-address-text .street { font-size: 15px; font-weight: 700; color: var(--text); }
.loc-address-text .city { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.loc-address-copy {
  font-size: 11px; color: var(--text-tertiary); flex-shrink: 0;
  display: flex; align-items: center; gap: 4px;
}
/* Transport mode tabs */
.loc-transport-tabs {
  display: flex; gap: 8px; margin-bottom: 14px;
}
.loc-transport-tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 12px 6px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); font-size: 12px; font-weight: 500;
  cursor: pointer; transition: background 0.12s, border-color 0.12s;
}
.loc-transport-tab:active { background: var(--bg-subtle); border-color: var(--primary); }
.loc-transport-tab svg { color: var(--primary); }
/* Nav buttons grid */
.loc-nav-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 14px;
}
.loc-nav-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius);
  text-decoration: none; color: var(--text); transition: background 0.12s;
}
.loc-nav-btn:active { background: var(--bg-subtle); }
/* .loc-nav-btn.full { grid-column: 1 / -1; } */
.loc-nav-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.loc-nav-text { flex: 1; }
.loc-nav-text .label { font-size: 14px; font-weight: 600; }
.loc-nav-text .sub { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }
/* Distance card — même style que nav buttons */
.loc-distance {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius);
  transition: all 0.3s ease;
}
.loc-distance-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.loc-distance-text { flex: 1; }
.loc-distance-text .label { font-size: 14px; font-weight: 600; color: var(--text); }
.loc-distance-text .sub { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }
.loc-distance.arrived {
  background: linear-gradient(135deg, #10b981, #059669);
  border-color: #059669;
}
.loc-distance.arrived .loc-distance-icon { background: rgba(255,255,255,0.2); }
.loc-distance.arrived .loc-distance-text .label { color: #fff; font-size: 16px; font-weight: 700; }
.loc-distance.arrived .loc-distance-text .sub { color: rgba(255,255,255,0.7); }
</style>
</head>
<body>
<div class="loc-page">

  <!-- Header -->
  <div class="loc-header">
    <div class="loc-header-top">
      <div class="loc-header-badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Localisation
      </div>
      <button class="loc-header-close" onclick="closeLocationPage()">&times;</button>
    </div>
    <div class="loc-header-info">
      <h4>Nous trouver</h4>
      <p>Sauf Imprévu — Bar à vins, Lyon 6e</p>
    </div>
    <div class="loc-header-accent"></div>
  </div>

  <!-- Map -->
  <div class="loc-map" id="locMap">
    <button class="loc-map-expand" onclick="toggleMap()" id="expandBtn" title="Agrandir">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="expandIcon"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
    </button>
    <iframe
      src="about:blank"
      id="mapFrame"
      loading="lazy"
      referrerpolicy="no-referrer">
    </iframe>
  </div>

  <!-- Content -->
  <div class="loc-content">

    <!-- Address (tap to copy) -->
    <div class="loc-address" onclick="copyAddress()">
      <div class="loc-address-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div class="loc-address-text">
        <div class="street">15 Rue Vauban</div>
        <div class="city">69006 Lyon, France</div>
      </div>
      <div class="loc-address-copy" id="copyLabel">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copier l'adresse
      </div>
    </div>

    <!-- Transport modes — ouvre Plans dans le bon mode -->
    <div class="loc-transport-tabs">
      <div class="loc-transport-tab" onclick="openExternal('maps://?daddr=45.7649859,4.8434166&dirflg=w')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 4v16"/><path d="M17 4v4"/><path d="M7 4v4"/><circle cx="13" cy="4" r="2"/><path d="M9 8h8"/><path d="M9 20l4-16 4 16"/></svg>
        À pied
      </div>
      <div class="loc-transport-tab" onclick="openExternal('maps://?daddr=45.7649859,4.8434166&dirflg=w')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18.5" cy="17.5" r="3.5"/><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="15" cy="5" r="1"/><path d="M12 17.5V14l-3-3 4-3 2 3h2"/></svg>
        Vélo
      </div>
      <div class="loc-transport-tab" onclick="openExternal('maps://?daddr=45.7649859,4.8434166&dirflg=d')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17h14v-5H5z"/><path d="M19 12l-1.5-6H6.5L5 12"/><circle cx="7.5" cy="17" r="1"/><circle cx="16.5" cy="17" r="1"/><path d="M5 12V8"/><path d="M19 12V8"/></svg>
        Voiture
      </div>
      <div class="loc-transport-tab" onclick="openExternal('maps://?daddr=45.7649859,4.8434166&dirflg=r')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="10" rx="2"/><path d="M3 10h18"/><path d="M8 7v10"/><path d="M16 7v10"/></svg>
        Transports
      </div>
    </div>

    <!-- Navigation buttons -->
    <div class="loc-nav-grid">
      <!-- Plans (Apple Maps) — ouvre l'app native directement -->
      <div class="loc-nav-btn" onclick="openExternal('maps://?daddr=45.7649859,4.8434166&saddr=Current+Location')">
        <div class="loc-nav-icon" style="background:#000;border-radius:10px;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
        </div>
        <div class="loc-nav-text">
          <div class="label">Plans</div>
          <div class="sub">Itinéraire via Apple Maps</div>
        </div>
      </div>
      <!-- Google Maps — deep link app si installée, sinon web -->
      <div class="loc-nav-btn" onclick="openExternal('comgooglemaps://?daddr=45.7649859,4.8434166&directionsmode=driving', 'https://maps.google.com/maps?daddr=45.7649859,4.8434166')">
        <div class="loc-nav-icon" style="background:#fff;border:1px solid var(--border);border-radius:10px;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#EA4335"/><circle cx="12" cy="9" r="2.5" fill="#fff"/></svg>
        </div>
        <div class="loc-nav-text">
          <div class="label">Google Maps</div>
          <div class="sub">Itinéraire via Google</div>
        </div>
      </div>
      <!-- Waze -->
      <div class="loc-nav-btn" onclick="openExternal('https://waze.com/ul?ll=45.7649859,4.8434166&navigate=yes')">
        <div class="loc-nav-icon" style="background:#33ccff;border-radius:10px;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm4 0c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zM12 6c2.76 0 5 2.24 5 5h-2c0-1.66-1.34-3-3-3S9 9.34 9 11H7c0-2.76 2.24-5 5-5z"/></svg>
        </div>
        <div class="loc-nav-text">
          <div class="label">Waze</div>
          <div class="sub">Navigation temps réel</div>
        </div>
      </div>
      <!-- Uber -->
      <div class="loc-nav-btn" onclick="openExternal('uber://?action=setPickup&dropoff[latitude]=45.7649859&dropoff[longitude]=4.8434166&dropoff[nickname]=Sauf%20Impr%C3%A9vu', 'https://m.uber.com/ul/?drop[0]=%7B%22latitude%22:45.7649859,%22longitude%22:4.8434166%7D')">
        <div class="loc-nav-icon" style="background:#000;border-radius:10px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c0 2.73-2.22 4.95-4.95 4.95H9.5v3.75H7.25V8.8h4.44c2.73 0 4.95 2.22 4.95 4.95v-4.95z"/></svg>
        </div>
        <div class="loc-nav-text">
          <div class="label">Uber</div>
          <div class="sub">Commander un VTC</div>
        </div>
      </div>
    </div>

    <!-- Distance / Boussole -->
    <div class="loc-distance" id="distanceBadge">
      <div class="loc-distance-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
      </div>
      <div class="loc-distance-text">
        <div class="label" id="distanceLabel">Boussole</div>
        <div class="sub" id="distanceText">Localisation en cours…</div>
      </div>
    </div>

  </div>
</div>

<script>
  // ── Theme ──
  (function() {
    var saved = localStorage.getItem('theme') || 'auto';
    var theme = saved;
    if (saved === 'auto') {
      theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', theme);
  })();

  // ── Map : coordonnées Sauf Imprévu — 15 Rue Vauban, Lyon 6e ──
  var LAT = 45.7649859;
  var LNG = 4.8434166;
  var ADDR = '15 Rue Vauban, 69006 Lyon';

  // OpenStreetMap embed centré sur Sauf Imprévu
  (function() {
    var mapFrame = document.getElementById('mapFrame');
    var bbox = (LNG - 0.003) + ',' + (LAT - 0.002) + ',' + (LNG + 0.003) + ',' + (LAT + 0.002);
    mapFrame.src = 'https://www.openstreetmap.org/export/embed.html?bbox=' + bbox + '&layer=mapnik&marker=' + LAT + ',' + LNG;
  })();

  // ── Close ──
  function closeLocationPage() {
    if (window.parent !== window) {
      window.parent.postMessage('closeLocation', '*');
      return;
    }
    if (history.length > 1) { history.back(); }
    else { window.location.href = '/'; }
  }

  // ── Toggle map ──
  var mapExpanded = false;
  function toggleMap() {
    var map = document.getElementById('locMap');
    var btn = document.getElementById('expandBtn');
    mapExpanded = !mapExpanded;
    if (mapExpanded) {
      map.classList.add('expanded');
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>';
      btn.title = 'Réduire';
    } else {
      map.classList.remove('expanded');
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>';
      btn.title = 'Agrandir';
    }
  }

  // ── Copy ──
  function copyAddress() {
    navigator.clipboard.writeText(ADDR).then(function() {
      var el = document.getElementById('copyLabel');
      el.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Adresse copiée !';
      setTimeout(function() {
        el.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copier l\'adresse';
      }, 2000);
    });
  }

  // ── Géolocalisation & Distance ──
  function haversineDistance(lat1, lon1, lat2, lon2) {
    var R = 6371000; // mètres
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLon = (lon2 - lon1) * Math.PI / 180;
    var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function formatDistance(meters) {
    if (meters < 10) return null; // "Vous y êtes !!"
    if (meters < 1000) return Math.round(meters) + ' m';
    return (meters / 1000).toFixed(1).replace('.0', '') + ' km';
  }

  function updateDistance(pos) {
    var dist = haversineDistance(pos.coords.latitude, pos.coords.longitude, LAT, LNG);
    var badge = document.getElementById('distanceBadge');
    var label = document.getElementById('distanceLabel');
    var sub = document.getElementById('distanceText');

    if (dist < 10) {
      badge.classList.add('arrived');
      label.textContent = 'Vous y êtes !!';
      sub.textContent = 'Bienvenue chez Sauf Imprévu';
    } else {
      badge.classList.remove('arrived');
      label.textContent = 'À ' + formatDistance(dist);
      sub.textContent = dist < 500 ? 'À pied depuis votre position' : dist < 5000 ? 'En voiture depuis votre position' : 'Depuis votre position';
    }
  }

  function geoError() {
    var label = document.getElementById('distanceLabel');
    var sub = document.getElementById('distanceText');
    label.textContent = 'Boussole';
    sub.textContent = 'Activez la localisation';
  }

  // ── Ouvrir un lien externe (fonctionne dans Capacitor) ──
  // url = lien principal (deep link app), fallbackUrl = site web si app pas installée
  function openExternal(url, fallbackUrl) {
    // Capacitor Browser plugin pour les URLs http(s)
    var isHttp = url.indexOf('http') === 0;
    if (isHttp && window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Browser) {
      window.Capacitor.Plugins.Browser.open({ url: url });
      return;
    }
    // Deep link app scheme (maps://, comgooglemaps://, uber://)
    if (!isHttp) {
      var opened = Date.now();
      window.location.href = url;
      // Si on revient vite → l'app n'est pas installée → fallback
      if (fallbackUrl) {
        setTimeout(function() {
          if (Date.now() - opened < 2000) openExternal(fallbackUrl);
        }, 800);
      }
      return;
    }
    window.open(url, '_system');
  }

  // Lancer la géoloc avec suivi continu
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(updateDistance, geoError, { enableHighAccuracy: true, timeout: 8000 });
    navigator.geolocation.watchPosition(updateDistance, function(){}, { enableHighAccuracy: true, maximumAge: 5000 });
  } else {
    geoError();
  }
</script>
</body>
</html>
