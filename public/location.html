<!DOCTYPE html>
<html lang="fr" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#3D6B8C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Nous trouver — Sauf Imprévu</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #3D6B8C;
  --primary-light: #5a8aab;
  --primary-dark: #2a4f6b;
  --accent: #c8a96e;
  --radius: 16px;
  --radius-sm: 10px;
  --font: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', 'Segoe UI', sans-serif;
  --bg: #f7f8fa;
  --bg-card: #ffffff;
  --bg-subtle: #f0f3f7;
  --text: #1a2332;
  --text-secondary: #5a6a7e;
  --text-tertiary: #8a9ab0;
  --border: rgba(0,0,0,0.07);
}
[data-theme="dark"] {
  --bg: #0f1923; --bg-card: #1a2636; --bg-subtle: #212f3f;
  --text: #eef2f7; --text-secondary: #8fa3bb; --text-tertiary: #5a7288;
  --border: rgba(255,255,255,0.07);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #0f1923; --bg-card: #1a2636; --bg-subtle: #212f3f;
    --text: #eef2f7; --text-secondary: #8fa3bb; --text-tertiary: #5a7288;
    --border: rgba(255,255,255,0.07);
  }
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; font-family: var(--font);
  background: var(--bg); color: var(--text);
  -webkit-font-smoothing: antialiased;
}
.loc-page {
  display: flex; flex-direction: column;
  height: 100dvh; height: 100vh;
  max-width: 600px; margin: 0 auto;
}
/* Header */
.loc-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 12px;
  padding-top: calc(14px + env(safe-area-inset-top, 0px));
  background: linear-gradient(135deg, var(--primary), #2a5a6e);
  color: #fff; flex-shrink: 0;
}
.loc-header-left { display: flex; align-items: center; gap: 10px; }
.loc-header-left h4 { font-size: 15px; font-weight: 700; margin: 0; }
.loc-header-left span { font-size: 11px; opacity: 0.8; }
.loc-header-close {
  background: rgba(255,255,255,0.15); border: none; color: #fff;
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; cursor: pointer;
}
/* Map */
.loc-map {
  flex-shrink: 0; position: relative;
  height: 45vh; min-height: 200px; max-height: 380px;
  background: var(--bg-subtle);
}
.loc-map iframe {
  width: 100%; height: 100%; border: none;
}
/* Content */
.loc-content {
  flex: 1; overflow-y: auto; padding: 16px;
  -webkit-overflow-scrolling: touch;
}
/* Address card (cliquable pour copier) */
.loc-address {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 16px 18px;
  margin-bottom: 14px; display: flex; align-items: center; gap: 14px;
  cursor: pointer; transition: background 0.12s;
}
.loc-address:active { background: var(--bg-subtle); }
.loc-address-icon {
  width: 44px; height: 44px; border-radius: 12px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.loc-address-text { flex: 1; }
.loc-address-text .street { font-size: 15px; font-weight: 700; color: var(--text); }
.loc-address-text .city { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.loc-address-copy {
  font-size: 11px; color: var(--text-tertiary); flex-shrink: 0;
  display: flex; align-items: center; gap: 4px;
}
/* Nav buttons grid */
.loc-nav-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 14px;
}
.loc-nav-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius);
  text-decoration: none; color: var(--text); transition: background 0.12s;
}
.loc-nav-btn:active { background: var(--bg-subtle); }
.loc-nav-btn.full { grid-column: 1 / -1; }
.loc-nav-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.loc-nav-text { flex: 1; }
.loc-nav-text .label { font-size: 14px; font-weight: 600; }
.loc-nav-text .sub { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }
</style>
</head>
<body>
<div class="loc-page">

  <!-- Header -->
  <div class="loc-header">
    <div class="loc-header-left">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <div>
        <h4>Nous trouver</h4>
        <span>Sauf Imprévu Bar à vins</span>
      </div>
    </div>
    <button class="loc-header-close" onclick="closeLocationPage()">&times;</button>
  </div>

  <!-- Map -->
  <div class="loc-map">
    <iframe
      src="https://www.openstreetmap.org/export/embed.html?bbox=6.1458%2C45.7682%2C6.1520%2C45.7712&layer=mapnik&marker=45.7697%2C6.1489"
      id="mapFrame"
      loading="lazy"
      referrerpolicy="no-referrer">
    </iframe>
  </div>

  <!-- Content -->
  <div class="loc-content">

    <!-- Address (tap to copy) -->
    <div class="loc-address" onclick="copyAddress()">
      <div class="loc-address-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div class="loc-address-text">
        <div class="street">15 Rue Vauban</div>
        <div class="city">69006 Lyon, France</div>
      </div>
      <div class="loc-address-copy" id="copyLabel">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copier
      </div>
    </div>

    <!-- Navigation buttons -->
    <div class="loc-nav-grid">
      <!-- Plans (Apple Maps) -->
      <a class="loc-nav-btn" href="https://maps.apple.com/?address=15+Rue+Vauban,+69006+Lyon&ll=45.7697,6.1489" target="_blank">
        <div class="loc-nav-icon" style="background:#000;border-radius:10px;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
        </div>
        <div class="loc-nav-text">
          <div class="label">Plans</div>
          <div class="sub">Apple Maps</div>
        </div>
      </a>
      <!-- Google Maps -->
      <a class="loc-nav-btn" href="https://maps.google.com/?q=Sauf+Imprévu,+15+Rue+Vauban,+69006+Lyon" target="_blank">
        <div class="loc-nav-icon" style="background:#fff;border:1px solid var(--border);border-radius:10px;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#EA4335"/><circle cx="12" cy="9" r="2.5" fill="#fff"/></svg>
        </div>
        <div class="loc-nav-text">
          <div class="label">Google Maps</div>
          <div class="sub">Carte & itinéraire</div>
        </div>
      </a>
      <!-- Waze -->
      <a class="loc-nav-btn full" href="https://waze.com/ul?q=15+Rue+Vauban,+69006+Lyon&navigate=yes" target="_blank">
        <div class="loc-nav-icon" style="background:#33ccff;border-radius:10px;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm4 0c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zM12 6c2.76 0 5 2.24 5 5h-2c0-1.66-1.34-3-3-3S9 9.34 9 11H7c0-2.76 2.24-5 5-5z"/></svg>
        </div>
        <div class="loc-nav-text">
          <div class="label">Waze</div>
          <div class="sub">Navigation temps réel</div>
        </div>
      </a>
    </div>

  </div>
</div>

<script>
  // ── Theme ──
  (function() {
    var saved = localStorage.getItem('theme') || 'auto';
    var theme = saved;
    if (saved === 'auto') {
      theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', theme);
  })();

  // ── Map : coordonnées Sauf Imprévu ──
  var LAT = 45.76965;
  var LNG = 6.14893;
  var ADDR = '15 Rue Vauban, 69006 Lyon';

  // Meilleure carte selon le contexte
  (function() {
    var mapFrame = document.getElementById('mapFrame');
    // OpenStreetMap embed centré sur Sauf Imprévu
    var bbox = (LNG - 0.003) + ',' + (LAT - 0.002) + ',' + (LNG + 0.003) + ',' + (LAT + 0.002);
    mapFrame.src = 'https://www.openstreetmap.org/export/embed.html?bbox=' + bbox + '&layer=mapnik&marker=' + LAT + ',' + LNG;
  })();

  // ── Close ──
  function closeLocationPage() {
    if (window.parent !== window) {
      window.parent.postMessage('closeLocation', '*');
      return;
    }
    if (history.length > 1) { history.back(); }
    else { window.location.href = '/'; }
  }

  // ── Copy ──
  function copyAddress() {
    navigator.clipboard.writeText(ADDR).then(function() {
      var el = document.getElementById('copyLabel');
      el.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copié !';
      setTimeout(function() {
        el.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copier';
      }, 2000);
    });
  }
</script>
</body>
</html>
