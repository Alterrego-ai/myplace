<!DOCTYPE html>
<html lang="fr" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#3D6B8C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Nous trouver — Sauf Imprévu</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #3D6B8C;
  --primary-light: #5a8aab;
  --primary-dark: #2a4f6b;
  --accent: #c8a96e;
  --radius: 16px;
  --radius-sm: 10px;
  --font: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', 'Segoe UI', sans-serif;
  --bg: #f7f8fa;
  --bg-card: #ffffff;
  --bg-subtle: #f0f3f7;
  --text: #1a2332;
  --text-secondary: #5a6a7e;
  --text-tertiary: #8a9ab0;
  --border: rgba(0,0,0,0.07);
}
[data-theme="dark"] {
  --bg: #0f1923; --bg-card: #1a2636; --bg-subtle: #212f3f;
  --text: #eef2f7; --text-secondary: #8fa3bb; --text-tertiary: #5a7288;
  --border: rgba(255,255,255,0.07);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #0f1923; --bg-card: #1a2636; --bg-subtle: #212f3f;
    --text: #eef2f7; --text-secondary: #8fa3bb; --text-tertiary: #5a7288;
    --border: rgba(255,255,255,0.07);
  }
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; font-family: var(--font);
  background: var(--bg); color: var(--text);
  -webkit-font-smoothing: antialiased;
}
.loc-page {
  display: flex; flex-direction: column;
  height: 100dvh; height: 100vh;
  max-width: 600px; margin: 0 auto;
}
/* Header */
.loc-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 12px;
  padding-top: calc(14px + env(safe-area-inset-top, 0px));
  background: linear-gradient(135deg, var(--primary), #2a5a6e);
  color: #fff; flex-shrink: 0;
}
.loc-header-left { display: flex; align-items: center; gap: 10px; }
.loc-header-left h4 { font-size: 15px; font-weight: 700; margin: 0; }
.loc-header-left span { font-size: 11px; opacity: 0.8; }
.loc-header-close {
  background: rgba(255,255,255,0.15); border: none; color: #fff;
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; cursor: pointer;
}
/* Map */
.loc-map {
  flex-shrink: 0; position: relative;
  height: 45vh; min-height: 200px; max-height: 380px;
  background: var(--bg-subtle);
}
.loc-map iframe {
  width: 100%; height: 100%; border: none;
}
/* Content */
.loc-content {
  flex: 1; overflow-y: auto; padding: 16px;
  -webkit-overflow-scrolling: touch;
}
/* Address card */
.loc-address {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 16px 18px;
  margin-bottom: 14px; display: flex; align-items: center; gap: 14px;
}
.loc-address-icon {
  width: 44px; height: 44px; border-radius: 12px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.loc-address-text { flex: 1; }
.loc-address-text .street { font-size: 15px; font-weight: 700; color: var(--text); }
.loc-address-text .city { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
/* Action list */
.loc-actions {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden;
}
.loc-action {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px; text-decoration: none; color: var(--text);
  border-bottom: 1px solid var(--border); transition: background 0.12s;
  cursor: pointer; background: none; width: 100%; text-align: left;
  font-family: var(--font); font-size: 14px;
}
.loc-action:last-child { border-bottom: none; }
.loc-action:active { background: var(--bg-subtle); }
.loc-action-icon {
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 20px;
}
.loc-action-text { flex: 1; }
.loc-action-text .label { font-size: 14px; font-weight: 600; color: var(--text); }
.loc-action-text .sub { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }
.loc-action-arrow { color: var(--text-tertiary); flex-shrink: 0; }
</style>
</head>
<body>
<div class="loc-page">

  <!-- Header -->
  <div class="loc-header">
    <div class="loc-header-left">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <div>
        <h4>Nous trouver</h4>
        <span>Sauf Imprévu Bar à vins</span>
      </div>
    </div>
    <button class="loc-header-close" onclick="closeLocationPage()">&times;</button>
  </div>

  <!-- Map -->
  <div class="loc-map">
    <iframe
      src="https://www.openstreetmap.org/export/embed.html?bbox=6.1458%2C45.7682%2C6.1520%2C45.7712&layer=mapnik&marker=45.7697%2C6.1489"
      id="mapFrame"
      loading="lazy"
      referrerpolicy="no-referrer">
    </iframe>
  </div>

  <!-- Content -->
  <div class="loc-content">

    <!-- Address -->
    <div class="loc-address">
      <div class="loc-address-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div class="loc-address-text">
        <div class="street">15 Rue Vauban</div>
        <div class="city">69006 Lyon, France</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="loc-actions">
      <a class="loc-action" href="https://maps.apple.com/?address=15+Rue+Vauban,+69006+Lyon&ll=45.7697,6.1489" target="_blank">
        <div class="loc-action-icon" style="background:linear-gradient(135deg,#333,#555);">
          <span style="font-size:18px;">🗺️</span>
        </div>
        <div class="loc-action-text">
          <div class="label">Plans</div>
          <div class="sub">Apple Maps</div>
        </div>
        <svg class="loc-action-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
      <a class="loc-action" href="https://maps.google.com/?q=Sauf+Imprévu,+15+Rue+Vauban,+69006+Lyon" target="_blank">
        <div class="loc-action-icon" style="background:linear-gradient(135deg,#4285f4,#34a853);">
          <span style="font-size:18px;">📍</span>
        </div>
        <div class="loc-action-text">
          <div class="label">Google Maps</div>
          <div class="sub">Voir sur la carte ou itinéraire</div>
        </div>
        <svg class="loc-action-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
      <a class="loc-action" href="https://waze.com/ul?q=15+Rue+Vauban,+69006+Lyon&navigate=yes" target="_blank">
        <div class="loc-action-icon" style="background:linear-gradient(135deg,#05c8f7,#33d4f5);">
          <span style="font-size:18px;">🚗</span>
        </div>
        <div class="loc-action-text">
          <div class="label">Waze</div>
          <div class="sub">Navigation temps réel</div>
        </div>
        <svg class="loc-action-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
      <button class="loc-action" onclick="copyAddress()">
        <div class="loc-action-icon" style="background:var(--bg-subtle);">
          <span style="font-size:18px;">📋</span>
        </div>
        <div class="loc-action-text">
          <div class="label" id="copyLabel">Copier l'adresse</div>
          <div class="sub">15 Rue Vauban · 69006 Lyon</div>
        </div>
      </button>
    </div>

  </div>
</div>

<script>
  // ── Theme ──
  (function() {
    var saved = localStorage.getItem('theme') || 'auto';
    var theme = saved;
    if (saved === 'auto') {
      theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', theme);
  })();

  // ── Map : coordonnées Sauf Imprévu ──
  var LAT = 45.76965;
  var LNG = 6.14893;
  var ADDR = '15 Rue Vauban, 69006 Lyon';

  // Meilleure carte selon le contexte
  (function() {
    var mapFrame = document.getElementById('mapFrame');
    // OpenStreetMap embed centré sur Sauf Imprévu
    var bbox = (LNG - 0.003) + ',' + (LAT - 0.002) + ',' + (LNG + 0.003) + ',' + (LAT + 0.002);
    mapFrame.src = 'https://www.openstreetmap.org/export/embed.html?bbox=' + bbox + '&layer=mapnik&marker=' + LAT + ',' + LNG;
  })();

  // ── Close ──
  function closeLocationPage() {
    if (window.parent !== window) {
      window.parent.postMessage('closeLocation', '*');
      return;
    }
    if (history.length > 1) { history.back(); }
    else { window.location.href = '/'; }
  }

  // ── Copy ──
  function copyAddress() {
    navigator.clipboard.writeText(ADDR).then(function() {
      var el = document.getElementById('copyLabel');
      el.textContent = 'Copié !';
      setTimeout(function() { el.textContent = 'Copier l\'adresse'; }, 2000);
    });
  }
</script>
</body>
</html>
