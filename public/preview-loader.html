<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boostore Loader</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: #1a1a2e;
  }
  .loader {
    display: flex; flex-direction: column;
    align-items: center;
  }
  dotlottie-player {
    width: 240px; height: 240px;
  }
  .logo {
    width: 180px; height: auto;
    margin-top: -20px;
    filter: brightness(0) invert(1);
  }
</style>
</head>
<body>
<div class="loader">
  <script src="https://unpkg.com/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs" type="module"></script>
  <dotlottie-player src="/Boostore-Loader.lottie" background="transparent" speed="1" loop autoplay></dotlottie-player>
  <img src="/img/boostore.svg" alt="Boostore" class="logo">
</div>
</body>
</html>
