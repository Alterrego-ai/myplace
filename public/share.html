<!DOCTYPE html>
<html lang="fr" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#3D6B8C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Partager — Sauf Imprévu</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #3D6B8C;
  --primary-light: #5a8aab;
  --primary-dark: #2a4f6b;
  --primary-ultra-light: #e8f0f6;
  --accent: #c8a96e;
  --radius: 16px;
  --radius-sm: 10px;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --font: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', 'Segoe UI', sans-serif;
  --bg: #f7f8fa;
  --bg-card: #ffffff;
  --bg-subtle: #f0f3f7;
  --text: #1a2332;
  --text-secondary: #5a6a7e;
  --text-tertiary: #8a9ab0;
  --border: rgba(0,0,0,0.07);
}
[data-theme="dark"] {
  --bg: #0f1923; --bg-card: #1a2636; --bg-subtle: #212f3f;
  --text: #eef2f7; --text-secondary: #8fa3bb; --text-tertiary: #5a7288;
  --border: rgba(255,255,255,0.07);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #0f1923; --bg-card: #1a2636; --bg-subtle: #212f3f;
    --text: #eef2f7; --text-secondary: #8fa3bb; --text-tertiary: #5a7288;
    --border: rgba(255,255,255,0.07);
  }
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; font-family: var(--font);
  background: var(--bg); color: var(--text);
  -webkit-font-smoothing: antialiased;
}
.share-page {
  display: flex; flex-direction: column;
  height: 100dvh; height: 100vh;
  max-width: 600px; margin: 0 auto;
}
/* Header */
.share-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 12px;
  padding-top: calc(14px + env(safe-area-inset-top, 0px));
  background: linear-gradient(135deg, var(--primary), #2a5a6e);
  color: #fff; flex-shrink: 0;
}
.share-header-left { display: flex; align-items: center; gap: 10px; }
.share-header-left h4 { font-size: 15px; font-weight: 700; margin: 0; }
.share-header-left span { font-size: 11px; opacity: 0.8; }
.share-header-close {
  background: rgba(255,255,255,0.15); border: none; color: #fff;
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; cursor: pointer;
}
/* Content */
.share-content {
  flex: 1; overflow-y: auto; padding: 20px 16px;
  -webkit-overflow-scrolling: touch;
}
/* Section */
.share-section {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 20px; margin-bottom: 16px;
}
/* QR code */
.share-qr {
  display: flex; justify-content: center; margin-bottom: 12px;
}
.share-qr canvas { border-radius: 12px; }
/* Action buttons */
.share-actions {
  display: flex; gap: 10px;
}
.share-action-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px; background: var(--bg-subtle); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: opacity 0.15s;
}
.share-action-btn:active { opacity: 0.6; }
.share-action-btn svg { flex-shrink: 0; }
/* Ambassador input */
.ambass-input {
  width: 100%; border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 14px; font-size: 14px; font-family: var(--font);
  background: var(--bg); color: var(--text); outline: none;
  margin-bottom: 10px;
}
.ambass-input:focus { border-color: var(--primary); }
/* Preview (sous le QR) */
.share-preview {
  background: var(--bg-subtle); border-radius: 10px; padding: 12px;
  text-align: center;
}
.share-preview-msg {
  font-size: 14px; color: var(--text); line-height: 1.5;
  font-style: italic;
}
.share-preview-link {
  font-size: 12px; color: var(--primary); margin-top: 4px;
  word-break: break-all;
}
/* Devenir ambassadeur CTA */
.ambass-cta {
  display: flex; align-items: center; gap: 14px;
  background: linear-gradient(135deg, var(--accent), #b8963e);
  color: #fff; border: none; border-radius: var(--radius);
  padding: 16px 20px; width: 100%; cursor: pointer;
  text-align: left; transition: opacity 0.15s;
}
.ambass-cta:active { opacity: 0.7; }
.ambass-cta-icon {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 22px;
}
.ambass-cta-text h3 { font-size: 15px; font-weight: 700; margin: 0 0 2px; }
.ambass-cta-text p { font-size: 12px; opacity: 0.85; margin: 0; }
/* Ambassador name badge (connecté) */
.ambass-name-badge {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px;
}
.ambass-name-badge span {
  font-size: 14px; font-weight: 600; color: var(--text);
}
.ambass-name-badge .badge {
  background: var(--accent); color: #fff; font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 12px; letter-spacing: 0.3px;
}
</style>
</head>
<body>
<div class="share-page">

  <!-- Header -->
  <div class="share-header">
    <div class="share-header-left">
      <svg width="22" height="22" viewBox="0 0 640 640" fill="#fff">
        <path d="M344 360L344 113.9L375 144.9C384.4 154.3 399.6 154.3 408.9 144.9C418.2 135.5 418.3 120.3 408.9 111L337 39C327.6 29.6 312.4 29.6 303.1 39L231 111C221.6 120.4 221.6 135.6 231 144.9C240.4 154.2 255.6 154.3 264.9 144.9L295.9 113.9L295.9 360C295.9 373.3 306.6 384 319.9 384C333.2 384 343.9 373.3 343.9 360zM144 256C144 247.2 151.2 240 160 240L200 240C213.3 240 224 229.3 224 216C224 202.7 213.3 192 200 192L160 192C124.7 192 96 220.7 96 256L96 512C96 547.3 124.7 576 160 576L480 576C515.3 576 544 547.3 544 512L544 256C544 220.7 515.3 192 480 192L440 192C426.7 192 416 202.7 416 216C416 229.3 426.7 240 440 240L480 240C488.8 240 496 247.2 496 256L496 512C496 520.8 488.8 528 480 528L160 528C151.2 528 144 520.8 144 512L144 256z"/>
      </svg>
      <div>
        <h4>Partager</h4>
        <span>Sauf Imprévu Bar à vins</span>
      </div>
    </div>
    <button class="share-header-close" onclick="closeSharePage()">&times;</button>
  </div>

  <!-- Content -->
  <div class="share-content">

    <!-- Recommandation (connecté uniquement) -->
    <div class="share-section" id="recoSection" style="display:none;">
      <div class="ambass-name-badge">
        <span id="ambassGreeting"></span>
        <span class="badge">Ambassadeur</span>
      </div>
      <div style="position:relative;">
        <textarea class="ambass-input" id="ambassCustomMsg" rows="2" placeholder="Personnalisez votre recommandation..." oninput="updatePreview()" style="resize:none;padding-right:44px;margin-bottom:0;"></textarea>
        <button onclick="inspirMessage()" style="position:absolute;right:8px;top:8px;background:none;border:none;font-size:20px;cursor:pointer;padding:4px;border-radius:8px;transition:transform 0.2s;" title="Inspirer" id="inspireBtn">✨</button>
      </div>
    </div>

    <!-- QR + Aperçu -->
    <div class="share-section">
      <div class="share-qr">
        <canvas id="qrCanvas" width="180" height="180"></canvas>
      </div>
      <div class="share-preview" id="previewBlock">
        <div class="share-preview-msg" id="previewMsg">Découvre Sauf Imprévu, bar à vins à Lyon 6e</div>
        <div class="share-preview-link" id="previewLink"></div>
      </div>
    </div>

    <!-- Boutons partage -->
    <div class="share-section">
      <div class="share-actions">
        <button class="share-action-btn" onclick="doShareWhatsApp()" style="background:#25D366;color:#fff;border-color:#25D366;flex:0 0 44px;padding:12px 0;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        </button>
        <button class="share-action-btn" onclick="doCopyLink()" style="flex:0 0 auto;padding:12px 16px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copier
        </button>
        <button class="share-action-btn" onclick="doNativeShare()" style="flex:1;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          Partager
        </button>
      </div>
    </div>

    <!-- Devenir Ambassadeur (non connecté) -->
    <button class="ambass-cta" id="ambassCta" onclick="devenirAmbassadeur()" style="display:none;">
      <div class="ambass-cta-icon">🤝</div>
      <div class="ambass-cta-text">
        <h3>Devenir Ambassadeur</h3>
        <p>Créez votre compte et partagez votre lien personnalisé</p>
      </div>
    </button>

  </div>
</div>

<script>
  // ── Theme (sync with main app) ──
  (function() {
    var saved = localStorage.getItem('theme') || 'auto';
    var theme = saved;
    if (saved === 'auto') {
      theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', theme);
  })();

  // ── Close ──
  function closeSharePage() {
    if (window.parent !== window) {
      window.parent.postMessage('closeShare', '*');
      return;
    }
    if (history.length > 1) { history.back(); }
    else { window.location.href = '/'; }
  }

  // ── Config ──
  var BASE_URL = window.location.origin;
  var SSO_KEY = 'sauf_imprevu_user';
  var user = null;
  try { user = JSON.parse(localStorage.getItem(SSO_KEY)); } catch(e) {}

  var isAmbassador = !!(user && user.name);

  // ── Init UI ──
  if (isAmbassador) {
    // Connecté : afficher la section reco + prénom
    document.getElementById('recoSection').style.display = '';
    var firstName = user.name.split(' ')[0];
    document.getElementById('ambassGreeting').textContent = firstName;
    // Pré-remplir un message par défaut
    document.getElementById('ambassCustomMsg').value = 'Je te recommande cet établissement';
    updatePreview();
  } else {
    // Non connecté : afficher le CTA Devenir Ambassadeur
    document.getElementById('ambassCta').style.display = '';
    document.getElementById('previewMsg').textContent = 'Découvre Sauf Imprévu, bar à vins à Lyon 6e';
    document.getElementById('previewLink').textContent = BASE_URL;
    generateQR(BASE_URL);
  }

  // ── Inspirer ──
  var INSPIRE_MESSAGES = [
    'Je te recommande cet établissement',
    'Je serai là ce soir, viens !',
    'Tu devrais essayer, c\'est top',
    'Le meilleur bar à vins de Lyon',
    'Un endroit que tu vas adorer',
    'Rejoins-moi pour un verre !'
  ];
  var inspireIndex = 0;

  function inspirMessage() {
    var textarea = document.getElementById('ambassCustomMsg');
    textarea.value = INSPIRE_MESSAGES[inspireIndex];
    inspireIndex = (inspireIndex + 1) % INSPIRE_MESSAGES.length;
    var btn = document.getElementById('inspireBtn');
    btn.style.transform = 'rotate(360deg)';
    setTimeout(function() { btn.style.transform = ''; }, 300);
    updatePreview();
  }

  // ── URL & Preview ──
  function getShareUrl() {
    if (isAmbassador) {
      var firstName = user.name.split(' ')[0];
      return BASE_URL + '?ref=' + encodeURIComponent(firstName.toLowerCase().replace(/\s+/g, '-'));
    }
    return BASE_URL;
  }

  function getShareText() {
    if (isAmbassador) {
      var firstName = user.name.split(' ')[0];
      var msg = document.getElementById('ambassCustomMsg').value.trim();
      if (msg) return firstName + ' : « ' + msg + ' »';
    }
    return 'Découvre Sauf Imprévu, bar à vins à Lyon 6e';
  }

  function updatePreview() {
    var url = getShareUrl();
    var text = getShareText();
    document.getElementById('previewMsg').textContent = text;
    document.getElementById('previewLink').textContent = url;
    generateQR(url);
  }

  // ── QR Code ──
  function generateQR(text) {
    var canvas = document.getElementById('qrCanvas');
    if (!canvas) return;
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() {
      var ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff';
      roundRect(ctx, 0, 0, 180, 180, 12);
      ctx.fill();
      ctx.drawImage(img, 15, 15, 150, 150);
    };
    img.onerror = function() {
      var ctx = canvas.getContext('2d');
      ctx.fillStyle = '#eee';
      ctx.fillRect(0, 0, 180, 180);
      ctx.fillStyle = '#999';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('QR Code', 90, 95);
    };
    img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=' + encodeURIComponent(text);
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // ── Partage ──
  function doShareWhatsApp() {
    var url = getShareUrl();
    var text = getShareText();
    window.open('https://wa.me/?text=' + encodeURIComponent(text + '\n' + url), '_blank');
  }

  function doCopyLink() {
    var url = getShareUrl();
    var text = getShareText();
    var content = isAmbassador ? text + '\n' + url : url;
    navigator.clipboard.writeText(content);
  }

  function doNativeShare() {
    var url = getShareUrl();
    var text = getShareText();
    if (navigator.share) {
      navigator.share({ title: 'Sauf Imprévu Bar à vins', text: text, url: url });
    } else {
      doCopyLink();
    }
  }

  // ── Devenir Ambassadeur ──
  function devenirAmbassadeur() {
    // Redirige vers la page de connexion/inscription
    var loginUrl = '/';
    if (window.parent !== window) {
      window.parent.postMessage('openLogin', '*');
    } else {
      window.location.href = loginUrl + '#login';
    }
  }

  // ── Listen for messages from parent ──
  window.addEventListener('message', function(e) {
    if (e.data === 'closeShare') { /* handled by parent */ }
  });
</script>
</body>
</html>
